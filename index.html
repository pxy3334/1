function drawMonster(m, sy) {
  const t = state.time || 0;
  const blink = Math.sin(t * 5.5 + m.phase) > 0.88 ? 0.22 : 1;
  const hurtPulse = m.hitCd > 0 ? Math.sin(t * 28) * 0.08 : 0;
  ctx.save();
  ctx.translate(m.x, sy);
  ctx.globalAlpha = m.hitCd > 0 ? 0.82 + Math.sin(t * 24) * 0.18 : 1;
  ctx.fillStyle = "rgba(0,0,0,0.3)";
  ellipse(0, 28, m.type === "jupiter" ? 46 : 32, 8);
  if (m.type === "moon") drawMoonMonster(m, blink, hurtPulse);
  else if (m.type === "mars") drawMarsAnomaly(m, blink, hurtPulse);
  else drawJupiterHazard(m, blink, hurtPulse);
  ctx.restore();
}

function drawMoonMonster(m, blink, hurtPulse) {
  const t = state.time || 0;
  const breathe = 1 + Math.sin(t * 4 + m.phase) * 0.045 + hurtPulse;
  ctx.save();
  ctx.scale(m.dir, 1);
  ctx.scale(breathe, 1 / breathe);
  const body = ctx.createRadialGradient(-10, -18, 6, 0, -6, 42);
  body.addColorStop(0, "#d9d6ca");
  body.addColorStop(0.52, "#8b887e");
  body.addColorStop(1, "#4e4d49");
  ctx.fillStyle = body;
  ellipse(0, -8, 34, 39);
  ctx.strokeStyle = "#22211f";
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.ellipse(0, -8, 34, 39, 0, 0, Math.PI * 2);
  ctx.stroke();
  ctx.fillStyle = "#5f5d57";
  for (let i = 0; i < 10; i++) {
    const a = i * 1.81 + m.phase;
    const r = 11 + (i % 4) * 6;
    circle(Math.cos(a) * r, -10 + Math.sin(a) * r * 0.8, 2.4 + (i % 3));
  }
  ctx.fillStyle = "#f7f2d9";
  ellipse(0, -20, 17, 18 * blink);
  ctx.strokeStyle = "#2c261f";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.ellipse(0, -20, 17, 18 * blink, 0, 0, Math.PI * 2);
  ctx.stroke();
  ctx.fillStyle = "#11110f";
  circle(3, -19, 5.5 * blink);
  ctx.fillStyle = "#fff";
  circle(5, -23, 1.8 * blink);
  ctx.fillStyle = "#16100d";
  ctx.beginPath();
  ctx.moveTo(-13, 4);
  ctx.quadraticCurveTo(0, 18, 16, 4);
  ctx.lineTo(12, 17);
  ctx.lineTo(5, 8);
  ctx.lineTo(-2, 18);
  ctx.lineTo(-8, 8);
  ctx.lineTo(-13, 17);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = "#3e3b37";
  ctx.lineWidth = 6;
  ctx.lineCap = "round";
  ctx.beginPath();
  ctx.moveTo(-25, -4);
  ctx.quadraticCurveTo(-38, 8 + Math.sin(t * 5) * 4, -29, 19);
  ctx.moveTo(25, -4);

  drawMonsterFeet(Math.sin(t * 6 + m.phase));
  ctx.restore();

function drawMarsAnomaly(m, blink, hurtPulse) {
  const t = state.time || 0;

  ctx.save();
  ctx.scale(pulse, pulse);
  const glow = ctx.createRadialGradient(0, -10, 8, 0, -8, 48);

  circle(0, -8, 52);
  ctx.fillStyle = "#bb2d17";
  ctx.strokeStyle = "#36130b";
  ctx.lineWidth = 3;
  for (let i = 0; i < 12; i++) {
    const a = i * Math.PI / 6 + Math.sin(t * 2 + m.phase) * 0.08;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a) * 29, -8 + Math.sin(a) * 29);
    ctx.lineTo(Math.cos(a) * 44, -8 + Math.sin(a) * 44);

  ctx.stroke();
  ctx.strokeStyle = "rgba(255,179,47,0.9)";

  for (let i = 0; i < 4; i++) {
    ctx.beginPath();
    ctx.moveTo(-22 + i * 12, 2);
    ctx.quadraticCurveTo(-10 + i * 5, 12, 8 + i * 7, 4 + Math.sin(t * 8 + i) * 2);

function drawPlayerOldFace(p, sy) {
  ctx.save();
  ctx.translate(p.x, sy - 5);

  if (state.shield > 0) {
    ctx.strokeStyle = "rgba(117,217,144,0.48)";
    ctx.lineWidth = 3;
    circleStroke(0, -35, 37 + Math.sin(state.time * 8) * 2);
  }

  ctx.scale(p.dir, 1);
  const speed = Math.min(1, Math.abs(p.vx) / 210);
  const grounded = !!p.ground;
  const phase = p.step;
  const bob = grounded ? Math.abs(Math.sin(phase)) * 4.2 * speed + Math.sin(state.time * 4) * 0.8 : 1.5;
  const legSwing = grounded ? Math.sin(phase) * speed : 0.48;
  const armSwing = grounded ? Math.sin(phase + Math.PI) * speed : -0.35;

  ctx.fillStyle = "rgba(0,0,0,0.34)";
  ellipse(0, 10, 31, 8);

  ctx.lineCap = "round";
  ctx.lineJoin = "round";

  const backLeg = -legSwing;
  ctx.strokeStyle = "#1f2b21";
  ctx.lineWidth = 10;
  ctx.beginPath();
  ctx.moveTo(-6, -19 + bob);
  ctx.lineTo(-15 - backLeg * 15, -1);
  ctx.lineTo(-22 - backLeg * 20, 11);
  ctx.stroke();
  drawBoot(-25 - backLeg * 20, 8, 0.78, -0.12);

  ctx.strokeStyle = "#2f412d";
  ctx.lineWidth = 10;
  ctx.beginPath();
  ctx.moveTo(8, -19 + bob);
  ctx.lineTo(12 + legSwing * 16, -1);
  ctx.lineTo(22 + legSwing * 20, 10);
  ctx.stroke();
  drawBoot(12 + legSwing * 20, 7, 0.86, 0.18);

  ctx.strokeStyle = "#283822";
  ctx.lineWidth = 9;
  ctx.beginPath();
  ctx.moveTo(-15, -43 + bob);
  ctx.quadraticCurveTo(-31 - armSwing * 4, -55 + bob, -38 - armSwing * 11, -65 + bob);
  ctx.stroke();
  drawGlove(-41 - armSwing * 11, -68 + bob, 0.72, -1);

  ctx.strokeStyle = "#35472d";
  ctx.lineWidth = 9;
  ctx.beginPath();
  ctx.moveTo(14, -42 + bob);
  ctx.quadraticCurveTo(34 + armSwing * 4, -54 + bob, 42 + armSwing * 10, -64 + bob);
  ctx.stroke();
  drawGlove(45 + armSwing * 10, -67 + bob, 0.72, 1);

  ctx.fillStyle = "#253321";
  round(-22, -48 + bob, 44, 46, 12, true);
  const vest = ctx.createLinearGradient(0, -45 + bob, 0, -4 + bob);
  vest.addColorStop(0, "#56683d");
  vest.addColorStop(0.5, "#344526");
  vest.addColorStop(1, "#1d2d1e");

function preparePlayerSprite() {
  const c = document.createElement("canvas");
  c.width = playerSprite.naturalWidth || playerSprite.width;
  c.height = playerSprite.naturalHeight || playerSprite.height;
  const g = c.getContext("2d", { willReadFrequently: true });
  g.drawImage(playerSprite, 0, 0);
  const img = g.getImageData(0, 0, c.width, c.height);
  const d = img.data;
  const w = c.width;
  const h = c.height;
  const seen = new Uint8Array(w * h);
  const stack = [];

  function isWhiteBg(idx) {
    const o = idx * 4;
    const r = d[o], gr = d[o + 1], b = d[o + 2];
    const bright = (r + gr + b) / 3;
    const neutral = Math.max(r, gr, b) - Math.min(r, gr, b);
    return bright > 226 && neutral < 44;
  }

  function pushBg(x, y) {
    if (x < 0 || y < 0 || x >= w || y >= h) return;
    const idx = y * w + x;
    if (seen[idx]) return;
    seen[idx] = 1;
    if (isWhiteBg(idx)) stack.push(idx);
  }

  for (let x = 0; x < w; x++) {
    pushBg(x, 0);
    pushBg(x, h - 1);
  }
  for (let y = 0; y < h; y++) {
    pushBg(0, y);
    pushBg(w - 1, y);
  }

  while (stack.length) {
    const idx = stack.pop();
    d[idx * 4 + 3] = 0;
    const x = idx % w;
    const y = Math.floor(idx / w);
    pushBg(x + 1, y);
    pushBg(x - 1, y);
    pushBg(x, y + 1);
    pushBg(x, y - 1);
  }

  for (let i = 0; i < seen.length; i++) {
    if (!seen[i] || d[i * 4 + 3] === 0) continue;
    const x = i % w;
    const y = Math.floor(i / w);
    const touchesCutout =
      (x > 0 && d[(i - 1) * 4 + 3] === 0) ||
      (x < w - 1 && d[(i + 1) * 4 + 3] === 0) ||
      (y > 0 && d[(i - w) * 4 + 3] === 0) ||
      (y < h - 1 && d[(i + w) * 4 + 3] === 0);
    if (touchesCutout && isWhiteBg(i)) d[i * 4 + 3] = Math.min(d[i * 4 + 3], 85);
  }
  g.putImageData(img, 0, 0);
  playerSpriteCanvas = c;
  playerSpriteReady = true;
}

function drawPlayer(p, sy) {
  if (!playerSpriteReady) return drawPlayerGenerated(p, sy);
  ctx.save();
  ctx.translate(p.x, sy - 4);

  const speed = Math.min(1, Math.abs(p.vx) / 295);
  const grounded = !!p.ground;
  const running = grounded && speed > 0.16;
  const phase = p.step * 1.08;
  const stride = Math.sin(phase);
  const stride2 = Math.sin(phase + Math.PI);
  const framePulse = Math.abs(Math.sin(phase));
  const bob = running ? framePulse * 6.2 * speed : (grounded ? 0 : 1.4);
  const squashX = running ? 1 + Math.sin(phase * 2) * 0.035 * speed : 1;
  const squashY = running ? 1 - Math.sin(phase * 2) * 0.028 * speed : 1;
  const tilt = running ? stride * 0.12 * speed + p.dir * 0.025 * speed : Math.sin(p.step) * 0.04 * speed;
  const shadowSquash = running ? 1 + framePulse * 0.24 * speed : 1;

  if (state.shield > 0) {
    ctx.strokeStyle = "rgba(117,217,144,0.55)";
    ctx.lineWidth = 3;
    circleStroke(0, -35, 39 + Math.sin(state.time * 8) * 2);
  }

  ctx.fillStyle = "rgba(0,0,0,0.34)";
  ellipse(0, 8, 31 + shadowSquash * 8, 7 + speed * 2);
  ctx.scale(p.dir, 1);
  if (running) {
    ctx.save();
    ctx.globalAlpha = 0.28 + speed * 0.28;
    ctx.strokeStyle = "rgba(246,234,212,0.38)";
    ctx.lineWidth = 2.2;
    ctx.lineCap = "round";
    for (let i = 0; i < 4; i++) {
      const y = -58 + i * 15 + Math.sin(phase + i) * 2;
      const x0 = -60 - i * 8 - framePulse * 10;
      ctx.beginPath();
      ctx.moveTo(x0, y);
      ctx.lineTo(x0 - 24 - speed * 18, y + 4);
      ctx.stroke();
    }
    ctx.restore();
  }
  ctx.rotate(tilt);
  const w = 100;
  const h = 82;
  if (running) {
    ctx.save();
    ctx.globalAlpha = 0.92;
    drawBoot(-25 + stride * 8, -2 + Math.max(0, -stride) * 8, 0.46 + speed * 0.06, -0.52 + stride * 0.24);
    ctx.globalAlpha = 0.76;
    drawBoot(17 + stride2 * 8, -2 + Math.max(0, -stride2) * 8, 0.4 + speed * 0.05, 0.38 + stride2 * 0.22);
    ctx.restore();
  }
  ctx.save();
  ctx.translate(0, bob);
  ctx.scale(squashX, squashY);
  ctx.scale(-1, 1);
  ctx.drawImage(playerSpriteCanvas || playerSprite, 54 - w, -83, w, h);
  ctx.restore();

  if (running) {
    ctx.strokeStyle = "rgba(244,234,216,0.34)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(-24 + stride * 5, 5, 11 + speed * 4, Math.PI * 1.08, Math.PI * 1.88);
    ctx.stroke();
    ctx.strokeStyle = "rgba(12,13,12,0.5)";
    ctx.lineWidth = 2.6;
    ctx.beginPath();
    ctx.moveTo(-35, 6 + framePulse * 2);
    ctx.quadraticCurveTo(-48, 10, -62, 5 + stride * 3);
    ctx.stroke();
  }
  ctx.restore();
}

function drawWarProjectiles() {
  const war = state.swarm;
  ctx.save();
  ctx.lineCap = "round";
  for (const p of war.projectiles) {
    ctx.strokeStyle = p.color;
    ctx.lineWidth = p.type === "rocket" ? 4 : 2;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    ctx.lineTo(p.x - p.vx * 0.035, p.y - p.vy * 0.035);
    ctx.stroke();
    if (p.type === "rocket") {
      ctx.fillStyle = "#101010";
      circle(p.x, p.y, 4);
    }
  }
  ctx.restore();
}

function drawWarUnit(u) {
  const type = warUnitType(u.type);
  const isPlayer = u.team === "player";
  const dir = isPlayer ? 1 : -1;
  const scale = u.type === "heavy" ? 1.08 : u.type === "rocket" ? 0.98 : 0.86;
  const main = isPlayer ? type.color : type.enemy;
  const helmet = isPlayer ? "#245c99" : "#8a2a1d";
  ctx.save();
  ctx.translate(u.x, u.y);
  ctx.scale(dir * scale, scale);
  ctx.globalAlpha = u.flash > 0 ? 0.82 : 1;
  ctx.fillStyle = "rgba(0,0,0,0.34)";
  ellipse(0, 18, 18, 5);
  ctx.fillStyle = u.flash > 0 ? "#ffffff" : main;
  round(-12, -10, 24, 26, 7, true);
  ctx.strokeStyle = "#111819";
  ctx.lineWidth = 2;
  round(-12, -10, 24, 26, 7, false);
  ctx.fillStyle = helmet;
  ctx.beginPath();
  ctx.arc(0, -21, 15, Math.PI, Math.PI * 2);
  ctx.lineTo(16, -18);
  ctx.quadraticCurveTo(0, -11, -16, -18);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = "#f6d2a7";
  circle(0, -17, 11);
  ctx.fillStyle = "#101418";
  round(-9, -20, 18, 5, 2, true);
  ctx.strokeStyle = "#0e1112";
  ctx.lineWidth = u.type === "rocket" ? 5 : 4;
  ctx.beginPath();
  ctx.moveTo(8, -7);
  ctx.lineTo(u.type === "rocket" ? 34 : 27, u.type === "rocket" ? -19 : -10);
  ctx.stroke();
  if (u.type === "rocket") {
    ctx.fillStyle = "#d8d6ce";
    round(20, -24, 24, 9, 4, true);
  } else if (u.type === "heavy") {
    ctx.fillStyle = "#85908b";
    round(-15, -4, 30, 22, 6, true);
    ctx.fillStyle = main;
    circle(0, 4, 7);
  }
  ctx.restore();
  drawWarUnitHealth(u);
}

function drawWarUnitHealth(u) {
  if (u.hp >= u.maxHp * 0.92) return;
  const w = 25, h = 3;
  ctx.fillStyle = "rgba(0,0,0,0.55)";
  ctx.fillRect(u.x - w / 2, u.y - 47, w, h);
  ctx.fillStyle = u.team === "player" ? "#43a8ff" : "#ff675a";
  ctx.fillRect(u.x - w / 2, u.y - 47, w * clamp(u.hp / u.maxHp, 0, 1), h);
}

function drawWarEffects() {
  const war = state.swarm;
  ctx.save();
  for (const e of war.effects) {
    const pct = clamp(e.life / e.maxLife, 0, 1);
    if (e.type === "explosion") {
      ctx.globalCompositeOperation = "lighter";
      const r = e.r * (1.05 - pct * 0.45);
      const g = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, r);
      g.addColorStop(0, "rgba(255,246,184," + (0.8 * pct).toFixed(3) + ")");
      g.addColorStop(0.28, e.color.replace(")", "," + (0.52 * pct).toFixed(3) + ")").replace("rgb", "rgba"));
      g.addColorStop(1, "rgba(255,116,35,0)");
      ctx.fillStyle = g;
      circle(e.x, e.y, r);
    } else {
      ctx.globalCompositeOperation = "lighter";
      ctx.fillStyle = e.color.replace(")", "," + pct.toFixed(3) + ")").replace("rgb", "rgba");
      circle(e.x, e.y, e.r * (0.5 + pct));
    }
  }
  ctx.globalCompositeOperation = "source-over";
  for (const f of war.floatTexts) {
    const pct = clamp(f.life / f.maxLife, 0, 1);
    ctx.globalAlpha = pct;
    label(f.text, f.x, f.y, f.size, f.color);
  }
  ctx.globalAlpha = 1;
  if (war.flashBlue > 0 || war.flashRed > 0) {
    ctx.fillStyle = war.flashBlue > war.flashRed ? "rgba(56,167,255,0.06)" : "rgba(255,75,69,0.06)";
    ctx.fillRect(14, 64, W - 28, 520);
  }
  ctx.restore();
}

function drawWarSkillGlyph(id, color) {
  ctx.strokeStyle = color;

    ctx.moveTo(-18, 8); ctx.lineTo(18, -10); ctx.moveTo(-18, -10); ctx.lineTo(18, 8); ctx.stroke();
  } else if (id === "missile") {
    ctx.rotate(-0.45); round(-8, -18, 16, 34, 6, true); ctx.fillStyle = "#111"; circle(0, -10, 3);
  } else if (id === "heal") {
    round(-6, -20, 12, 40, 3, true); round(-20, -6, 40, 12, 3, true);

    circle(0, 0, 13); ctx.strokeStyle = "#111"; ctx.lineWidth = 2; circleStroke(0, 0, 7);

function compactNumber(value) {
  const n = Math.max(0, Math.floor(value || 0));
  if (n >= 1000000) return (n / 1000000).toFixed(1) + "M";
  if (n >= 1000) return (n / 1000).toFixed(n >= 10000 ? 1 : 0) + "K";
  return String(n);
}

function drawJoystick() {
  const b = JOYSTICK;
  const dx = touch.active ? clamp(touch.x - b.x, -44, 44) : 0;
  const dy = touch.active ? clamp(touch.y - b.y, -28, 28) : 0;
  const base = ctx.createRadialGradient(b.x, b.y, 18, b.x, b.y, b.r);
  base.addColorStop(0, "rgba(245,232,202,0.08)");
  base.addColorStop(1, "rgba(245,232,202,0.025)");
  ctx.fillStyle = base;
  circle(b.x, b.y, b.r);
  ctx.strokeStyle = "rgba(245,232,202,0.16)";
  ctx.lineWidth = 2;
  circleStroke(b.x, b.y, b.r);
  ctx.strokeStyle = "rgba(245,232,202,0.08)";
  ctx.lineWidth = 1;
  circleStroke(b.x, b.y, b.r * 0.62);

  ctx.strokeStyle = "rgba(245,232,202,0.18)";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(b.x - 36, b.y);
  ctx.lineTo(b.x + 36, b.y);
  ctx.stroke();

  const kx = b.x + dx;
  const ky = b.y + dy * 0.35;
  ctx.fillStyle = "rgba(245,232,202,0.13)";
  circle(kx, ky, b.knob);
  ctx.strokeStyle = "rgba(245,232,202,0.24)";
  ctx.lineWidth = 2;
  circleStroke(kx, ky, b.knob);
  ctx.fillStyle = "rgba(245,232,202,0.13)";
  circle(kx, ky, 12);
}

function clearFitText(text, x, y, maxWidth, size, minSize, color, align = "center", weight = 800) {
  text = String(text == null ? "" : text);
  let fontSize = size;
  ctx.save();
  ctx.textAlign = align;
  ctx.textBaseline = "alphabetic";
  while (fontSize > minSize) {
    ctx.font = weight + " " + fontSize + "px Microsoft YaHei, system-ui, sans-serif";
    if (ctx.measureText(text).width <= maxWidth) break;
    fontSize -= 0.5;
  }
  ctx.font = weight + " " + Math.max(minSize, fontSize) + "px Microsoft YaHei, system-ui, sans-serif";
  ctx.fillStyle = color;
  ctx.fillText(text, x, y);
  ctx.restore();
}

function clearComicTextFit(text, x, y, maxWidth, size, minSize, fill, stroke) {
  text = String(text == null ? "" : text);
  let fontSize = size;
  ctx.save();
  ctx.textAlign = "center";
  ctx.textBaseline = "alphabetic";
  ctx.lineJoin = "round";
  while (fontSize > minSize) {
    ctx.font = "900 " + fontSize + "px Microsoft YaHei, system-ui, sans-serif";
    if (ctx.measureText(text).width <= maxWidth) break;
    fontSize -= 0.5;
  }
  ctx.font = "900 " + Math.max(minSize, fontSize) + "px Microsoft YaHei, system-ui, sans-serif";
  ctx.strokeStyle = stroke;
  ctx.lineWidth = Math.max(3, fontSize * 0.17);
  ctx.strokeText(text, x, y);
  ctx.fillStyle = fill;
  ctx.fillText(text, x, y);
  ctx.restore();
}

function drawClearRankInsignia(x, y, rank, s, t = 0) {
  const idx = Math.max(0, MENU_RANKS.indexOf(rank));
  const chevrons = Math.min(3, Math.max(1, Math.floor(idx / 2) + 1));
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(s, s);
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  for (let i = 0; i < chevrons; i++) {
    const yy = -2 + i * 10;
    ctx.beginPath();
    ctx.moveTo(-15, yy);
    ctx.lineTo(0, yy - 11);
    ctx.lineTo(15, yy);
    ctx.strokeStyle = "#4a2b19";
    ctx.lineWidth = 7;
    ctx.stroke();
    ctx.strokeStyle = "#e2aa45";
    ctx.lineWidth = 4;
    ctx.stroke();

  ctx.globalCompositeOperation = "lighter";
  ctx.strokeStyle = "rgba(255,241,164," + (0.12 + (0.5 + Math.sin(t * 4.2) * 0.5) * 0.22).toFixed(3) + ")";
  ctx.lineWidth = 2.2;
  for (let i = 0; i < chevrons; i++) {
    const yy = -2 + i * 10;
    ctx.beginPath();
    ctx.moveTo(-10, yy - 1);
    ctx.lineTo(0, yy - 8);
    ctx.lineTo(10, yy - 1);
    ctx.stroke();
  }
  if (idx >= 6) {
    ctx.fillStyle = "#e2aa45";
    drawStar(0, 27, 7);
    ctx.strokeStyle = "#4a2b19";
    ctx.lineWidth = 2;
    ctx.stroke();
  }
  ctx.restore();
}

function drawClearStar(x, y, r, t = 0) {
  const pulse = 0.5 + Math.sin(t * 4.4) * 0.5;

  ctx.rotate(Math.sin(t * 1.7) * 0.035);
  ctx.fillStyle = "rgba(0,0,0,0.16)";
  drawStar(3, 5, r);
  ctx.globalCompositeOperation = "lighter";
  ctx.fillStyle = "rgba(255,220,96," + (0.08 + pulse * 0.15).toFixed(3) + ")";
  drawStar(0, 0, r + 8 + pulse * 4);
  ctx.globalCompositeOperation = "source-over";
  const g = ctx.createLinearGradient(-r, -r, r, r);
  g.addColorStop(0, "#fff1a7");
  g.addColorStop(0.36, "#f0b43f");
  g.addColorStop(0.72, "#c7791f");
  g.addColorStop(1, "#fff0a0");
  ctx.fillStyle = g;
  drawStar(0, 0, r);
  ctx.strokeStyle = "#7b3f14";
  ctx.lineWidth = 2.2;
  ctx.stroke();
  ctx.strokeStyle = "rgba(255,245,180,0.74)";
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(-7, -13);
  ctx.lineTo(0, -24);
  ctx.lineTo(7, -13);
  ctx.stroke();
  ctx.globalCompositeOperation = "lighter";
  const sparkleAngle = t * 2.8;
  const sparkleX = Math.cos(sparkleAngle) * 10;
  const sparkleY = Math.sin(sparkleAngle) * 7 - 7;
  ctx.strokeStyle = "rgba(255,255,218," + (0.35 + pulse * 0.45).toFixed(3) + ")";
  ctx.lineWidth = 1.4;
  ctx.beginPath();
  ctx.moveTo(sparkleX - 5, sparkleY);
  ctx.lineTo(sparkleX + 5, sparkleY);
  ctx.moveTo(sparkleX, sparkleY - 5);
  ctx.lineTo(sparkleX, sparkleY + 5);
  ctx.stroke();
  ctx.restore();
}

    const sy = y + 48 + ((i * 73 + t * (12 + (i % 4) * 3)) % (h - 96));
    const a = 0.12 + Math.sin(t * 3.3 + i) * 0.08;
    ctx.fillStyle = "rgba(255,231,146," + Math.max(0.03, a).toFixed(3) + ")";
    circle(sx, sy, 0.7 + (i % 2) * 0.5);

  ctx.restore();
}

function drawClearBurstShine(x, y, w, h, t) {
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(x, y, w, h, 0, 0, Math.PI * 2);
  ctx.clip();
  drawClearSweep(x - w, y - h, w * 2, h * 2, t + 0.3, 72, 0.24);
  ctx.globalCompositeOperation = "lighter";
  for (let i = 0; i < 9; i++) {
    const a = t * 1.4 + i * 0.7;
    const px = x + Math.cos(a) * (52 + (i % 3) * 26);
    const py = y + Math.sin(a * 1.3) * (16 + (i % 2) * 10);
    ctx.strokeStyle = "rgba(255,226,126," + (0.14 + (i % 3) * 0.04).toFixed(3) + ")";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(px - 3, py);
    ctx.lineTo(px + 3, py);
    ctx.moveTo(px, py - 3);
    ctx.lineTo(px, py + 3);
    ctx.stroke();
  }
  ctx.restore();
}

function drawClearSweep(x, y, w, h, t, band = 70, alpha = 0.16) {
  ctx.save();
  ctx.beginPath();
  ctx.rect(x, y, w, h);
  ctx.clip();
  const sx = x + ((t * 70) % (w + band * 2)) - band;
  const sweep = ctx.createLinearGradient(sx, y, sx + band, y + h);
  sweep.addColorStop(0, "rgba(255,245,202,0)");
  sweep.addColorStop(0.5, "rgba(255,245,202," + alpha.toFixed(3) + ")");
  sweep.addColorStop(1, "rgba(255,245,202,0)");
  ctx.fillStyle = sweep;
  ctx.fillRect(x, y, w, h);
  ctx.restore();
}

    const px = Math.cos(a) * r;
    const py = Math.sin(a) * r;

function comicText(text, x, y, size, fill, stroke) {
  ctx.save();
  ctx.textAlign = "center";
  ctx.textBaseline = "alphabetic";
  ctx.font = "900 " + size + "px Microsoft YaHei, system-ui, sans-serif";
  ctx.lineJoin = "round";
  ctx.strokeStyle = stroke;
  ctx.lineWidth = Math.max(4, size * 0.16);
  ctx.strokeText(text, x, y);
  ctx.fillStyle = fill;
  ctx.fillText(text, x, y);
  ctx.restore();
}

function fitLabel(text, x, y, maxWidth, size, minSize, color, align = "center", weight = 800) {
  let fontSize = size;
  ctx.save();
  ctx.textAlign = align;
  ctx.textBaseline = "alphabetic";
  do {
    ctx.font = weight + " " + fontSize + "px Microsoft YaHei, system-ui, sans-serif";
    if (ctx.measureText(text).width <= maxWidth || fontSize <= minSize) break;
    fontSize -= 0.5;
  } while (fontSize > minSize);
  ctx.fillStyle = color;
  ctx.fillText(text, x, y);
  ctx.restore();
}

function comicTextFit(text, x, y, maxWidth, size, minSize, fill, stroke) {
  let fontSize = size;
  ctx.save();
  ctx.textAlign = "center";
  ctx.textBaseline = "alphabetic";
  ctx.lineJoin = "round";
  do {
    ctx.font = "900 " + fontSize + "px Microsoft YaHei, system-ui, sans-serif";
    if (ctx.measureText(text).width <= maxWidth || fontSize <= minSize) break;
    fontSize -= 0.5;
  } while (fontSize > minSize);
  ctx.strokeStyle = stroke;
  ctx.lineWidth = Math.max(3, fontSize * 0.17);
  ctx.strokeText(text, x, y);
  ctx.fillStyle = fill;
  ctx.fillText(text, x, y);
  ctx.restore();
}

function updateParticles(dt) {
  for (let i = state.particles.length - 1; i >= 0; i--) {
    const p = state.particles[i];
    p.life -= dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 55 * dt;
    if (p.life <= 0) state.particles.splice(i, 1);
  }
  for (let i = state.texts.length - 1; i >= 0; i--) {
    const t = state.texts[i];
    t.life -= dt;
    t.y -= 24 * dt;
    if (t.life <= 0) state.texts.splice(i, 1);
  }
}

function burst(x, y, color, count) {

      x,
      y,
      vx: Math.cos(a) * s,
      vy: Math.sin(a) * s - 28,
      life: 0.35 + Math.random() * 0.35,
      maxLife: 0.7,
      color,
      r: 1.5 + Math.random() * 2.6

  }
}

  g.addColorStop(1, "#000000");
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.moveTo(0, -h * 0.52);
  ctx.bezierCurveTo(w * 0.55, -h * 0.12, w * 0.47, h * 0.44, 0, h * 0.52);
  ctx.bezierCurveTo(-w * 0.47, h * 0.44, -w * 0.55, -h * 0.12, 0, -h * 0.52);
  ctx.fill();
  ctx.strokeStyle = "rgba(210,235,220,0.18)";
  ctx.lineWidth = 1.4;
  ctx.stroke();
  ctx.fillStyle = "rgba(255,255,255,0.34)";

}

function drawStar(x, y, r) {

    const a = -Math.PI / 2 + i * Math.PI / 5;
    const rr = i % 2 === 0 ? r : r * 0.45;
    const px = x + Math.cos(a) * rr;
    const py = y + Math.sin(a) * rr;
    if (i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fill();
}

function round(x, y, w, h, r, fill) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  if (fill) ctx.fill();
  else ctx.stroke();
}

function circle(x, y, r) {
  ctx.beginPath();

}

function circleStroke(x, y, r) {

}

function ellipse(x, y, rx, ry) {
  ctx.beginPath();
  ctx.ellipse(x, y, rx, ry, 0, 0, Math.PI * 2);

}

function clamp(v, min, max) {
  return Math.max(min, Math.min(max, v));
}

function rand(seed) {
  const x = Math.sin(seed * 12.9898 + 78.233) * 43758.5453;
  return x - Math.floor(x);
}

function pointerDown(e) {
  const p = screenPoint(e.clientX, e.clientY);
  if (state.mode === "intro") {
    addInteraction(p.x, p.y, "intro");
    enterMenu();
    return;
  }
  for (let i = buttons.length - 1; i >= 0; i--) {
    const b = buttons[i];
    if (p.x >= b.x && p.x <= b.x + b.w && p.y >= b.y && p.y <= b.y + b.h) {
      addButtonClickEffect(b, p.x, p.y);
      addInteraction(p.x, p.y, "tap");
      b.fn();
      return;
    }
  }

  if (state.mode !== "play") return;
  if (isJoystickPoint(p)) {
    touch.active = true;
    touch.id = e.pointerId;
    setJoystickFromPoint(p);
    canvas.setPointerCapture(e.pointerId);
  }
}

function pointerMove(e) {
  if (!touch.active || e.pointerId !== touch.id) return;
  const p = screenPoint(e.clientX, e.clientY);
  setJoystickFromPoint(p);
}

function pointerUp(e) {
  if (e.pointerId === touch.id) {
    touch.active = false;
    touch.id = null;
    touch.dir = 0;
    touch.x = JOYSTICK.x;
    touch.y = JOYSTICK.y;
  }
}

function isJoystickPoint(p) {
  return p.y > 705 && p.x < 230;
}

function setJoystickFromPoint(p) {
  const dx = clamp(p.x - JOYSTICK.x, -56, 56);
  const dy = clamp(p.y - JOYSTICK.y, -42, 42);
  touch.x = JOYSTICK.x + dx;
  touch.y = JOYSTICK.y + dy;
  const raw = dx / 48;
  touch.dir = Math.abs(raw) < 0.14 ? 0 : clamp(raw, -1, 1);
}

function loop(now) {
  const dt = Math.min(0.033, (now - last) / 1000 || 0);
  last = now;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

addEventListener("resize", resize);
addEventListener("keydown", e => {
  keys[e.code] = true;
  if (state.mode === "intro") {
    if (e.code === "Enter" || e.code === "Space") {
      addInteraction(W / 2, H - 70, "intro");
      enterMenu();
      e.preventDefault();
    }
    return;
  }
  if (state.mode === "menu") {
    if (state.skillPanelOpen) {
      if (e.code === "Escape" || e.code === "Enter" || e.code === "Space") closeSkillPanel();
      e.preventDefault();
      return;
    }
    if (e.code === "ArrowLeft" || e.code === "KeyA") {
      addInteraction(92, 638, "tap");
      changeMenuDepth(-1);
    }
    if (e.code === "ArrowRight" || e.code === "KeyD") {
      addInteraction(W - 92, 638, "tap");
      changeMenuDepth(1);
    }
    if (e.code === "Enter" || e.code === "Space") {
      addInteraction(W / 2, 742, "tap");
      launchCoreMission();
      e.preventDefault();
    }
    return;
  }
  if (state.mode === "swarm") {
    if (e.code === "Escape" || e.code === "KeyB") {
      returnFromSwarmBattle();
      e.preventDefault();
      return;
    }
    if (e.code === "KeyR") {
      replaySwarmBattle();
      e.preventDefault();
      return;
    }
    if (e.code === "Space" || e.code === "Enter") {
      deployWarUnit("foot", true);
      e.preventDefault();
      return;
    }
  }
  if ((e.code === "KeyP" || e.code === "Escape") && (state.mode === "play" || state.mode === "pause")) {
    addInteraction(W - 58, 58, "tap");
    togglePause();
  }
  if ((e.code === "ShiftLeft" || e.code === "ShiftRight") && state.mode === "play") {
    activateDash();
    e.preventDefault();
  }
  if (state.mode === "over" && e.code === "Space") {
    addInteraction(W / 2, 594, "tap");
    startGame();
    e.preventDefault();
  }
});
addEventListener("keyup", e => { keys[e.code] = false; });
canvas.addEventListener("pointerdown", pointerDown);
canvas.addEventListener("pointermove", pointerMove);
canvas.addEventListener("pointerup", pointerUp);
canvas.addEventListener("pointercancel", pointerUp);

resize();
initMenu();
if (location.hash === "#swarm" || location.hash === "#war") startSwarmBattle();
requestAnimationFrame(loop);
</script>
</body>
</html>
