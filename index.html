function resize() {
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width = Math.floor(innerWidth * dpr);
  canvas.height = Math.floor(innerHeight * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  scale = Math.min(innerWidth / W, innerHeight / H);
  ox = (innerWidth - W * scale) / 2;
  oy = (innerHeight - H * scale) / 2;
}

function screenPoint(clientX, clientY) {
  return { x: (clientX - ox) / scale, y: (clientY - oy) / scale };
}

function loadPlayerProgress() {
  try {
    const raw = localStorage.getItem(PLAYER_PROGRESS_KEY);
    const parsed = raw ? JSON.parse(raw) : null;
    return { xp: Math.max(0, Math.floor((parsed && parsed.xp) || 0)) };
  } catch (e) {
    return { xp: 0 };
  }
}

function savePlayerProgress() {
  if (!state) return;
  try {
    localStorage.setItem(PLAYER_PROGRESS_KEY, JSON.stringify({ xp: Math.max(0, Math.floor(state.playerXp || 0)) }));
  } catch (e) {}
}

function isEarthCleared() {
  try {
    return localStorage.getItem(EARTH_CLEAR_KEY) === "1" || parseInt(localStorage.getItem("rescueDepthBest") || "0", 10) >= LEVEL_TARGET;
  } catch (e) {
    return false;
  }
}

function markEarthCleared() {
  try {
    localStorage.setItem(EARTH_CLEAR_KEY, "1");
  } catch (e) {}
}

function monsterTypeForStage(index) {
  if (index === 1) return "moon";
  if (index === 2) return "mars";
  if (index === 3) return "jupiter";
  if (index >= 4) return ["moon", "mars", "jupiter"][index % 3];
  return "moon";
}

function xpForPlayerLevel(level) {
  const n = Math.max(1, Math.floor(level || 1));
  return Math.floor(PLAYER_XP_BASE + (n - 1) * PLAYER_XP_STEP + Math.pow(n - 1, 1.32) * 26);
}

function playerLevelFromXp(totalXp) {
  let xp = Math.max(0, Math.floor(totalXp || 0));
  let level = 1;
  while (xp >= xpForPlayerLevel(level) && level < 99) {
    xp -= xpForPlayerLevel(level);
    level++;
  }
  return { level, into: xp, next: xpForPlayerLevel(level) };
}

function playerMaxHpForLevel(level) {
  const n = Math.max(1, level || 1);
  return 100 + (n >= 2 ? 12 : 0) + (n >= 9 ? 18 : 0) + Math.max(0, n - 10) * 3;
}

function playerSkillForLevel(level) {
  const n = Math.max(1, Math.floor(level || 1));
  const fixed = PLAYER_SKILLS.find(skill => skill.level === n);
  if (fixed) return fixed;
  if (n > PLAYER_SKILLS[PLAYER_SKILLS.length - 1].level) {
    return { level: n, id: "veteranMastery", name: "老兵强化 +" + (n - 10), desc: "生命和冲刺继续增强" };
  }
  return null;
}

function unlockedPlayerSkills(level) {
  const n = Math.max(1, level || 1);
  const skills = [];
  for (let i = 1; i <= n; i++) {
    const skill = playerSkillForLevel(i);
    if (skill) skills.push(skill);
  }
  return skills;
}

function hasPlayerSkill(id) {
  return !!state && unlockedPlayerSkills(state.playerLevel || 1).some(skill => skill.id === id);
}

function nextPlayerSkill(level = state ? state.playerLevel || 1 : 1) {
  return playerSkillForLevel(Math.max(1, Math.floor(level || 1)) + 1);
}

function newestPlayerSkill(level = state ? state.playerLevel || 1 : 1) {
  return playerSkillForLevel(level) || PLAYER_SKILLS[0];
}

function supplyCrateXp() {
  const floorBonus = Math.min(48, Math.floor(((state && state.maxFloor) || 0) / 10) * 6);
  return 42 + floorBonus;
}

function dashCooldownMax() {
  if (!hasPlayerSkill("veteran")) return 3.4;
  return Math.max(1.6, 2.2 - Math.max(0, ((state && state.playerLevel) || 1) - 10) * 0.06);
}

function applyPlayerProgressToState() {
  if (!state) return;
  const info = playerLevelFromXp(state.playerXp || 0);
  state.playerLevel = info.level;
  state.playerXpInto = info.into;
  state.playerXpNext = info.next;
  state.unlockedSkillCount = unlockedPlayerSkills(info.level).length;
  if (state.player) state.player.maxHp = playerMaxHpForLevel(info.level);
}

function playerXpProgress() {
  if (!state || !state.playerXpNext) return 0;
  return clamp((state.playerXpInto || 0) / state.playerXpNext, 0, 1);
}

function grantPlayerXp(amount, x, y, note) {
  if (!state || amount <= 0) return;
  const before = state.playerLevel || playerLevelFromXp(state.playerXp || 0).level;
  state.playerXp = Math.max(0, Math.floor((state.playerXp || 0) + amount));
  state.xpThisRun = Math.max(0, Math.floor((state.xpThisRun || 0) + amount));
  applyPlayerProgressToState();
  savePlayerProgress();
  if (state.player && state.playerLevel > before) {
    const unlocked = [];
    for (let level = before + 1; level <= state.playerLevel; level++) {
      const skill = playerSkillForLevel(level);
      if (skill) unlocked.push(skill);
    }
    const maxHp = playerMaxHpForLevel(state.playerLevel);
    state.player.maxHp = maxHp;
    state.player.hp = Math.min(maxHp, (state.player.hp || maxHp) + 22);
    addText(x || W / 2, y || 220, "升级 LV " + state.playerLevel, COLORS.gold);
    if (unlocked.length) addText(x || W / 2, (y || 220) + 24, "解锁 " + unlocked[0].name, COLORS.cyan);
    burst(x || W / 2, y || 220, COLORS.gold, 24);
  } else if (note) {
    addText(x || W / 2, y || 220, note + " +" + amount + "XP", "rgba(246,234,212,0.76)");
  }
}

function initMenu() {
  const progress = loadPlayerProgress();
  state = {
    mode: "intro",
    time: 0,
    best: parseInt(localStorage.getItem("rescueDepthBest") || "0", 10),
    totalCleared: 0,
    stageIndex: menuStageIndex,
    levelInStage: 1,
    coins: loadCoinBank(),
    rescued: 0,
    supplies: loadSupplyDrops(),
    playerXp: progress.xp,
    xpThisRun: 0,
    playerLevel: 1,
    playerXpInto: 0,
    playerXpNext: xpForPlayerLevel(1),
    particles: [],
    texts: []
  };
  applyPlayerProgressToState();
}

function enterMenu() {
  if (!state || state.mode !== "intro") return;
  state.mode = "menu";
  state.time = 0;
  state.skillPanelOpen = false;
  addInteraction(W / 2, H - 64, "intro");
}

function missionTitle() {

  return planet.sub + " / " + rankTitle();
}

function rankTitle(extra = 0) {

function rankTitleEn(rank = rankTitle()) {

function rankTitleEnShort(rank = rankTitle()) {

}

function launchCoreMission() {
  startGame(menuStageIndex, 1, 0);
}

function setMenuStage(index) {
  menuStageIndex = clamp(index, 0, MENU_LOCATION_RECTS.length - 1);
  menuDepthIndex = menuDepthByStage[menuStageIndex] ?? 2;
  if (state && state.mode === "menu") {
    state.stageIndex = menuStageIndex;
    state.depthIndex = menuDepthIndex;

}

function changeMenuStage(dir) {
  setMenuStage((menuStageIndex + dir + MENU_LOCATION_RECTS.length) % MENU_LOCATION_RECTS.length);
}

function changeMenuDepth(dir) {
  setMenuDepth((menuDepthIndex + dir + MENU_DEPTHS.length) % MENU_DEPTHS.length);
}

function setMenuDepth(index) {
  menuDepthIndex = clamp(index, 0, MENU_DEPTHS.length - 1);
  menuDepthByStage[menuStageIndex] = menuDepthIndex;
  if (state && state.mode === "menu") state.depthIndex = menuDepthIndex;
}

function comingSoon(text) {

  addText(W / 2, 730, text + "功能开发中", COLORS.gold);
}

function openSkillPanel() {

  state.skillPanelOpen = true;
}

function closeSkillPanel() {
  if (!state) return;
  state.skillPanelOpen = false;
}

function startSwarmBattle(data = {}) {
  SwarmBattleManager.startSwarmBattle(data);
}

function returnFromSwarmBattle() {
  if (!state || state.mode !== "swarm") return;
  const progress = loadPlayerProgress();
  const info = playerLevelFromXp(progress.xp);
  state.mode = "menu";

  state.skillPanelOpen = false;

  state.texts = [];
}

function replaySwarmBattle() {
  const diff = state && state.swarm ? state.swarm.difficultyLevel : undefined;
  startSwarmBattle({ difficultyLevel: diff });
}

const SwarmBattleManager = {
  startSwarmBattle(data = {}) {
    initSwarmBattle(data);
  },
  initBattle(data = {}) {
    initSwarmBattle(data);
  },
  spawnUnit(team = "player", typeId = "foot", lane = 1, countScale = 1) {
    spawnWarSwarm(team, typeId, clamp(lane, 0, WAR_LANES.length - 1), countScale);
  },
  spawnWave(team = "player", typeId = "foot", lane = 1, countScale = 1) {
    spawnWarSwarm(team, typeId, clamp(lane, 0, WAR_LANES.length - 1), countScale);
  },
  updateSwarm(dt) {
    updateSwarmBattle(dt);
  },
  updateUnits(dt) {
    updateWarUnits(dt);
  },
  resolveCombat(dt) {
    updateWarUnits(dt);
    updateWarProjectiles(dt);
  },
  checkWinLose() {
    checkWarWinLose();
  },
  drawSwarm() {
    drawSwarmBattle();
  },
  renderBattle() {
    drawSwarmBattle();
  },
  returnResults() {
    return state && state.swarm ? state.swarm.result : null;
  }
};

function loadSupplyDrops() {
  const legacy = localStorage.getItem("operationCoreWarSupplyDrops");
  const value = localStorage.getItem(SUPPLY_DROPS_KEY);
  return Math.max(0, parseInt(value || legacy || "0", 10) || 0);
}

function saveSupplyDrops(value) {
  localStorage.setItem(SUPPLY_DROPS_KEY, String(Math.max(0, Math.floor(value || 0))));
}

function loadCoinBank() {
  return Math.max(0, parseInt(localStorage.getItem(COIN_BANK_KEY) || "0", 10) || 0);
}

function saveCoinBank(value) {
  localStorage.setItem(COIN_BANK_KEY, String(Math.max(0, Math.floor(value || 0))));
}

function techPowerValue(levelInfo, supplies) {
  const best = parseInt(localStorage.getItem("rescueDepthBest") || "0", 10) || 0;
  return Math.floor(1200 + (levelInfo.level || 1) * 260 + best * 9 + Math.min(5000, supplies * 6));
}

function initSwarmBattle(data = {}) {
  const progress = loadPlayerProgress();
  const levelInfo = playerLevelFromXp(progress.xp);
  const difficulty = Math.max(1, Math.floor(data.difficultyLevel || menuStageIndex * 2 + menuDepthIndex + 1));
  const supplyDrops = loadSupplyDrops();
  const coins = loadCoinBank();
  const techPower = techPowerValue(levelInfo, supplyDrops);
  const playerPower = 1 + Math.max(0, levelInfo.level - 1) * 0.055 + Math.min(0.42, supplyDrops / 90000);
  const enemyPower = 0.88 + difficulty * 0.055;
  const playerBaseMax = Math.floor(2550 + levelInfo.level * 55 + Math.min(700, supplyDrops * 0.015));
  const enemyBaseMax = Math.floor(6500 + difficulty * 520);
  state = {
    mode: "swarm",
    time: 0,
    best: parseInt(localStorage.getItem("rescueDepthBest") || "0", 10),
    coins,
    rescued: 0,
    supplies: supplyDrops,
    playerXp: progress.xp,
    xpThisRun: 0,
    playerLevel: levelInfo.level,
    playerXpInto: levelInfo.into,
    playerXpNext: levelInfo.next,
    stageIndex: menuStageIndex,
    depthIndex: menuDepthIndex,
    earthCleared: isEarthCleared(),
    skillPanelOpen: false,
    particles: [],
    texts: [],
    swarm: {
      playerUnits: data.playerUnits || WAR_UNIT_TYPES.map(u => u.id),
      upgrades: data.upgrades || {},
      difficultyLevel: difficulty,
      playerPower,
      enemyPower,
      playerBaseHp: playerBaseMax,
      playerBaseMax,
      enemyBaseHp: enemyBaseMax,
      enemyBaseMax,
      supplyDrops,
      coins,
      techPower,
      battleTime: 0,
      timerLimit: 18,
      unitSeq: 0,
      units: [],
      projectiles: [],
      effects: [],
      floatTexts: [],
      cardCooldowns: {},
      skillCooldowns: {},
      spawn: { player: 0.12, enemy: 0.25, autoCycle: 0 },
      result: null,
      resultTimer: 0,
      rewardGranted: false,
      speed: 1,
      auto: true,
      shake: 0,
      flashBlue: 0,
      flashRed: 0,
      empTime: 0,
      selectedTab: "units"
    }
  };
  for (const u of WAR_UNIT_TYPES) state.swarm.cardCooldowns[u.id] = 0;
  for (const s of WAR_SKILLS) state.swarm.skillCooldowns[s.id] = 0;
  addWarExplosion(W / 2, 360, 90, "#f0ce6d", 0.8);
  for (let lane = 0; lane < 3; lane++) {
    spawnWarSwarm("player", lane === 1 ? "rifle" : "foot", lane, 0.9);
    spawnWarSwarm("player", lane === 2 ? "heavy" : "foot", lane, 0.45);
    spawnWarSwarm("enemy", lane === 0 ? "rifle" : "foot", lane, 0.92);
    spawnWarSwarm("enemy", lane === 1 ? "rocket" : "foot", lane, 0.52);
  }
}

function updateSwarmBattle(dt) {
  const war = state.swarm;
  state.time += dt;
  updateWarEffects(dt);
  if (!war || war.result) {
    if (war && war.result) war.resultTimer += dt;
    return;
  }
  const simDt = dt * war.speed;
  war.battleTime += simDt;
  war.shake = Math.max(0, war.shake - dt * 2.8);
  war.flashBlue = Math.max(0, war.flashBlue - dt * 2.4);
  war.flashRed = Math.max(0, war.flashRed - dt * 2.4);
  war.empTime = Math.max(0, war.empTime - simDt);
  for (const id in war.cardCooldowns) war.cardCooldowns[id] = Math.max(0, war.cardCooldowns[id] - simDt);
  for (const id in war.skillCooldowns) war.skillCooldowns[id] = Math.max(0, war.skillCooldowns[id] - simDt);

  war.spawn.player -= simDt;
  war.spawn.enemy -= simDt;
  if (war.auto && war.spawn.player <= 0) {
    const cycle = ["foot", "rifle", "foot", "rocket", "heavy", "rifle"];
    deployWarUnit(cycle[war.spawn.autoCycle++ % cycle.length], false);
    war.spawn.player = Math.max(0.72, 1.15 - war.difficultyLevel * 0.025);
  }
  if (war.spawn.enemy <= 0) {
    spawnEnemyWarWave();
    war.spawn.enemy = Math.max(0.62, 0.94 - war.difficultyLevel * 0.026);
  }

  const steps = war.speed > 1 ? 2 : 1;
  for (let i = 0; i < steps; i++) {
    const stepDt = simDt / steps;
    updateWarUnits(stepDt);
    updateWarProjectiles(stepDt);
    checkWarWinLose();
    if (war.result) break;
  }
}

function updateSwarm(dt) {
  updateSwarmBattle(dt);
}

function spawnUnit(team = "player", typeId = "foot", lane = 1, countScale = 1) {
  spawnWarSwarm(team, typeId, clamp(lane, 0, WAR_LANES.length - 1), countScale);
}

function resolveCombat(dt) {
  updateWarUnits(dt);
  updateWarProjectiles(dt);
}

function checkWinLose() {
  checkWarWinLose();
}

function deployWarUnit(typeId, manual = true) {
  const war = state && state.swarm;
  if (!war || war.result) return;
  const type = warUnitType(typeId);
  if (!type || (manual && war.cardCooldowns[type.id] > 0)) return;
  const lanes = manual ? [0, 1, 2] : [war.spawn.autoCycle % 3, (war.spawn.autoCycle + 1) % 3];
  const scale = manual ? 1 : 0.68;
  for (const lane of lanes) spawnWarSwarm("player", type.id, lane, scale);
  war.cardCooldowns[type.id] = type.cooldown;
  addWarFloat(84, 628, "+" + type.name + " 小队", COLORS.gold, 14);
}

function spawnEnemyWarWave() {
  const war = state.swarm;
  const pool = war.difficultyLevel > 6
    ? ["foot", "rifle", "rocket", "heavy", "foot", "rifle"]
    : war.difficultyLevel > 3
      ? ["foot", "rifle", "rocket", "foot", "heavy"]
      : ["foot", "foot", "rifle", "rocket"];
  const type = pool[Math.floor(Math.random() * pool.length)];
  const lane = Math.floor(Math.random() * 3);
  spawnWarSwarm("enemy", type, lane, war.difficultyLevel > 5 ? 0.88 : 0.76);
  if (Math.random() < 0.45) spawnWarSwarm("enemy", "foot", (lane + 1 + Math.floor(Math.random() * 2)) % 3, 0.54);
}

function spawnWarSwarm(team, typeId, lane, countScale = 1) {
  const war = state && state.swarm;
  const type = warUnitType(typeId);
  if (!war || !type || war.result) return;
  const power = team === "player" ? war.playerPower : war.enemyPower;
  const count = Math.max(1, Math.round(type.swarm * countScale));
  for (let i = 0; i < count; i++) {
    const jitter = (Math.random() - 0.5) * 54;
    const row = (Math.random() - 0.5) * 34;
    const hp = Math.floor(type.hp * power * (team === "enemy" ? 1.04 : 1));
    war.units.push({
      id: ++war.unitSeq,
      team,
      type: type.id,
      lane,
      x: team === "player" ? 74 + Math.random() * 42 - i * 3 : W - 74 - Math.random() * 42 + i * 3,
      y: WAR_LANES[lane].y + row,
      offset: jitter,
      hp,
      maxHp: hp,
      damage: type.damage * power,
      speed: type.speed * (team === "enemy" && war.empTime > 0 ? 0.48 : 1),
      range: type.range,
      fireRate: type.fireRate,
      splash: type.splash || 0,
      attackCd: Math.random() * type.fireRate,
      flash: 0,
      step: Math.random() * Math.PI * 2,
      dead: false
    });
  }
}

function updateWarUnits(dt) {
  const war = state.swarm;
  const units = war.units;
  for (const u of units) {
    if (u.dead) continue;
    const type = warUnitType(u.type);
    const dir = u.team === "player" ? 1 : -1;
    u.step += dt * 8;
    u.flash = Math.max(0, u.flash - dt * 8);
    u.attackCd = Math.max(0, u.attackCd - dt);
    const speedMod = u.team === "enemy" && war.empTime > 0 ? 0.45 : 1;
    const target = findWarTarget(u);
    if (target && Math.abs(target.x - u.x) <= u.range) {
      if (u.attackCd <= 0) {
        fireWarWeapon(u, target);
        u.attackCd = u.fireRate * (u.team === "enemy" && war.empTime > 0 ? 1.55 : 1);
      }
    } else {
      u.x += dir * type.speed * speedMod * dt;
      if ((u.team === "player" && u.x > W - 54) || (u.team === "enemy" && u.x < 54)) {
        damageWarBase(u.team === "player" ? "enemy" : "player", u.damage * 4.6 + 28, u.x, u.y);
        u.dead = true;
        addWarExplosion(u.x, u.y, u.type === "heavy" ? 46 : 30, u.team === "player" ? "#43a8ff" : "#ff4a35", 0.35);
      }
    }
  }
  for (let i = units.length - 1; i >= 0; i--) if (units[i].dead) units.splice(i, 1);
}

function findWarTarget(unit) {
  const dir = unit.team === "player" ? 1 : -1;
  let best = null;
  let bestDx = Infinity;
  for (const other of state.swarm.units) {
    if (other.dead || other.team === unit.team || other.lane !== unit.lane) continue;
    const dx = (other.x - unit.x) * dir;
    if (dx > -18 && dx < bestDx) {
      best = other;
      bestDx = dx;
    }
  }
  return best;
}

function fireWarWeapon(unit, target) {
  const war = state.swarm;
  const type = warUnitType(unit.type);
  const color = unit.team === "player" ? type.color : type.enemy;
  if (unit.range > 62 || unit.type === "rocket") {
    const dx = target.x - unit.x;
    const dy = target.y - unit.y;
    const d = Math.max(1, Math.hypot(dx, dy));
    const speed = unit.type === "rocket" ? 260 : 520;
    war.projectiles.push({
      x: unit.x + (unit.team === "player" ? 12 : -12),
      y: unit.y - 16,
      vx: dx / d * speed,
      vy: dy / d * speed,
      targetId: target.id,
      team: unit.team,
      lane: unit.lane,
      damage: unit.damage,
      splash: unit.splash,
      color,
      type: unit.type,
      life: 0.9
    });
  } else {
    damageWarUnit(target, unit.damage, unit.team, unit.x, unit.y);
    addWarSpark(target.x, target.y - 16, color);
  }
}

function updateWarProjectiles(dt) {
  const war = state.swarm;
  for (const p of war.projectiles) {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    const target = war.units.find(u => u.id === p.targetId && !u.dead);
    if (!target || p.life <= 0 || Math.hypot(target.x - p.x, target.y - p.y) < 18) {
      hitWarProjectile(p, target);
      p.dead = true;
    }
  }
  for (let i = war.projectiles.length - 1; i >= 0; i--) if (war.projectiles[i].dead) war.projectiles.splice(i, 1);
}

function hitWarProjectile(p, target) {
  const x = target ? target.x : p.x;
  const y = target ? target.y : p.y;
  if (p.splash) {
    addWarExplosion(x, y, p.splash, p.color, 0.55);
    for (const u of state.swarm.units) {
      if (u.dead || u.team === p.team || u.lane !== p.lane) continue;
      const dist = Math.abs(u.x - x);
      if (dist <= p.splash + 16) damageWarUnit(u, p.damage * (u === target ? 1 : 0.58), p.team, x, y);
    }
  } else if (target) {
    damageWarUnit(target, p.damage, p.team, x, y);
    addWarSpark(x, y - 14, p.color);
  }
}

function damageWarUnit(unit, amount, sourceTeam, x, y) {
  if (!unit || unit.dead) return;
  const dmg = Math.max(1, Math.round(amount));
  unit.hp -= dmg;
  unit.flash = 1;
  addWarFloat(unit.x, unit.y - 32, "-" + dmg, sourceTeam === "player" ? "#83e9ff" : "#ff7566", 12);
  if (sourceTeam === "player") state.swarm.flashRed = 0.55;
  else state.swarm.flashBlue = 0.55;
  if (unit.hp <= 0) {
    unit.dead = true;
    const color = unit.team === "player" ? "#43a8ff" : "#ff4a35";
    addWarExplosion(x || unit.x, y || unit.y, unit.type === "heavy" ? 52 : unit.type === "rocket" ? 44 : 30, color, unit.type === "foot" ? 0.2 : 0.48);
  }
}

function damageWarBase(baseTeam, amount, x, y) {
  const war = state.swarm;
  if (baseTeam === "enemy") {
    war.enemyBaseHp = Math.max(0, war.enemyBaseHp - amount);
    war.flashRed = 0.75;
  } else {
    war.playerBaseHp = Math.max(0, war.playerBaseHp - amount);
    war.flashBlue = 0.75;
  }
  addWarFloat(baseTeam === "enemy" ? W - 78 : 78, y || 360, "-" + Math.round(amount), baseTeam === "enemy" ? "#ff675a" : "#66c9ff", 15);
}

function activateWarSkill(id) {
  const war = state && state.swarm;
  const skill = WAR_SKILLS.find(s => s.id === id);
  if (!war || !skill || war.result || war.skillCooldowns[id] > 0) return;
  war.skillCooldowns[id] = skill.cooldown;
  if (id === "air") {
    for (const lane of WAR_LANES) {
      for (let i = 0; i < 3; i++) {
        const x = 245 + i * 45 + Math.random() * 40;
        addWarExplosion(x, lane.y + (Math.random() - 0.5) * 30, 64, "#ffcf58", 0.55);
        damageWarArea("enemy", x, lane.y, 84, 95);
      }
    }
  } else if (id === "missile") {
    for (let i = 0; i < 5; i++) {
      const lane = WAR_LANES[i % 3];
      const x = 280 + Math.random() * 120;
      addWarExplosion(x, lane.y + (Math.random() - 0.5) * 38, 78, "#ff7538", 0.75);
      damageWarArea("enemy", x, lane.y, 92, 135);
    }
  } else if (id === "heal") {
    war.playerBaseHp = Math.min(war.playerBaseMax, war.playerBaseHp + 420);
    for (const u of war.units) if (u.team === "player") u.hp = Math.min(u.maxHp, u.hp + 42);
    addWarFloat(108, 184, "+修复", "#75d990", 18);
    addWarExplosion(112, 260, 70, "#75d990", 0.2);
  } else if (id === "emp") {
    war.empTime = 3;
    for (const u of war.units) if (u.team === "enemy") damageWarUnit(u, 30, "player", u.x, u.y);
    addWarExplosion(W / 2, 364, 112, "#83e9ff", 0.5);
  }
}

function damageWarArea(targetTeam, x, y, radius, amount) {
  for (const u of state.swarm.units) {
    if (u.dead || u.team !== targetTeam) continue;
    const dist = Math.hypot(u.x - x, u.y - y);
    if (dist <= radius) damageWarUnit(u, amount * (1 - dist / radius * 0.35), targetTeam === "enemy" ? "player" : "enemy", x, y);
  }
}

function checkWarWinLose() {
  const war = state.swarm;
  if (war.result) return;
  if (war.enemyBaseHp <= 0) finishSwarmBattle(true);
  else if (war.playerBaseHp <= 0) finishSwarmBattle(false);
  else if (war.battleTime > 24) finishSwarmBattle(war.enemyBaseHp / war.enemyBaseMax < war.playerBaseHp / war.playerBaseMax);
}

function finishSwarmBattle(win) {
  const war = state.swarm;
  if (!war || war.result) return;
  const speedBonus = Math.max(0, Math.floor((war.timerLimit - Math.min(war.timerLimit, war.battleTime)) * 18));
  const supplyDrops = win ? 620 + war.difficultyLevel * 135 + speedBonus : 120 + war.difficultyLevel * 26;
  const coinReward = win ? 420 + war.difficultyLevel * 95 + Math.floor(speedBonus * 0.6) : 90 + war.difficultyLevel * 18;
  const xpReward = win ? 180 + war.difficultyLevel * 42 : 65 + war.difficultyLevel * 12;
  war.result = {
    win,
    supplyDrops,
    coinReward,
    xpReward,
    bonusRewards: win && Math.random() < 0.32 ? ["unit_fragment"] : []
  };
  war.rewardGranted = true;
  war.supplyDrops += supplyDrops;
  war.coins += coinReward;
  state.supplies = war.supplyDrops;
  state.coins = war.coins;
  saveSupplyDrops(war.supplyDrops);
  saveCoinBank(war.coins);
  grantPlayerXp(xpReward, W / 2, 250, "战场");
  addWarExplosion(W / 2, 360, win ? 150 : 95, win ? "#f0ce6d" : "#ff4a35", 1.2);
}

function updateWarEffects(dt) {
  const war = state && state.swarm;
  if (!war) return;
  for (let i = war.effects.length - 1; i >= 0; i--) {
    const e = war.effects[i];
    e.life -= dt;
    e.x += (e.vx || 0) * dt;
    e.y += (e.vy || 0) * dt;
    if (e.life <= 0) war.effects.splice(i, 1);
  }
  for (let i = war.floatTexts.length - 1; i >= 0; i--) {
    const f = war.floatTexts[i];
    f.life -= dt;
    f.y -= 28 * dt;
    if (f.life <= 0) war.floatTexts.splice(i, 1);
  }
}

function addWarExplosion(x, y, r, color, shake = 0) {
  const war = state && state.swarm;
  if (!war) return;
  war.effects.push({ type: "explosion", x, y, r, color, life: 0.42, maxLife: 0.42 });
  for (let i = 0; i < Math.min(28, Math.max(8, r / 3)); i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 35 + Math.random() * r * 2.2;
    war.effects.push({ type: "spark", x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, r: 1.5 + Math.random() * 3.5, color, life: 0.34 + Math.random() * 0.26, maxLife: 0.6 });
  }
  war.shake = Math.max(war.shake, shake);
}

function addWarSpark(x, y, color) {
  const war = state && state.swarm;
  if (!war) return;
  war.effects.push({ type: "spark", x, y, vx: (Math.random() - 0.5) * 120, vy: -40 - Math.random() * 80, r: 2.5, color, life: 0.22, maxLife: 0.22 });
}

function addWarFloat(x, y, text, color, size = 12) {
  const war = state && state.swarm;
  if (!war) return;
  war.floatTexts.push({ x, y, text, color, size, life: 0.85, maxLife: 0.85 });
}

function warUnitType(id) {
  return WAR_UNIT_TYPES.find(u => u.id === id) || WAR_UNIT_TYPES[0];
}

function formatWarTime(seconds) {
  const s = Math.max(0, Math.floor(seconds));
  return String(Math.floor(s / 60)).padStart(2, "0") + ":" + String(s % 60).padStart(2, "0");
}

function getStageBackgroundCode(index) {
  const stage = CAMPAIGN_STAGES[index] || null;
  const code = stage && STAGE_BACKGROUND_PATHS[stage.code] ? stage.code : STAGE_BACKGROUND_FALLBACKS[index % STAGE_BACKGROUND_FALLBACKS.length];
  return code || "EARTH";
}

function drawStageArtBackground(index, parallax = 0) {
  const code = getStageBackgroundCode(index || 0);
  const img = stageBackgroundImages[code];
  if (img && img.complete && img.naturalWidth > 0) {
    const scale = Math.max(W / img.naturalWidth, H / img.naturalHeight) * 1.05;
    const drawW = img.naturalWidth * scale;
    const drawH = img.naturalHeight * scale;
    const dx = (W - drawW) / 2 + Math.sin((state ? state.time : performance.now() / 1000) * 0.18) * parallax;
    const dy = (H - drawH) / 2 + Math.cos((state ? state.time : performance.now() / 1000) * 0.13) * parallax * 0.55;
    ctx.drawImage(img, dx, dy, drawW, drawH);
  } else {
    const stage = CAMPAIGN_STAGES[index] || CAMPAIGN_STAGES[0];
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, stage.sky);
    g.addColorStop(0.52, "#17110c");
    g.addColorStop(1, "#080504");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
  }

  const shade = ctx.createRadialGradient(W / 2, H * 0.42, W * 0.16, W / 2, H * 0.5, W * 0.78);
  shade.addColorStop(0, "rgba(0,0,0,0.06)");
  shade.addColorStop(1, "rgba(0,0,0,0.5)");
  ctx.fillStyle = shade;
  ctx.fillRect(0, 0, W, H);
}

function startGame(stageIndex = 0, levelInStage = 1, totalCleared = 0, carry = null) {
  const carryData = carry || {};
  const progress = loadPlayerProgress();
  const levelInfo = playerLevelFromXp(progress.xp);
  const startingMaxHp = playerMaxHpForLevel(levelInfo.level);
  state = {
    mode: "play",
    time: 0,
    cameraY: 0,
    scrollSpeed: 46,
    nextFloor: 1,
    lastGenY: 360,
    maxFloor: 0,
    best: parseInt(localStorage.getItem("rescueDepthBest") || "0", 10),
    coins: carryData.coins || 0,
    rescued: carryData.rescued || 0,
    supplies: carryData.supplies || 0,
    playerXp: progress.xp,
    xpThisRun: 0,
    playerLevel: levelInfo.level,
    playerXpInto: levelInfo.into,
    playerXpNext: levelInfo.next,
    stageIndex,
    depthIndex: menuDepthByStage[stageIndex] ?? menuDepthIndex,
    earthCleared: isEarthCleared(),
    levelInStage,
    totalCleared,
    levelTarget: LEVEL_TARGET,
    levelClear: null,
    missionClearAwarded: false,
    endReason: "",
    reviveUsed: false,
    doubleUsed: false,
    shield: 0,
    armor: 0,
    maxArmor: 100,
    adArmorViews: 0,
    adShieldCd: 0,
    dashCd: 0,
    adGate: null,
    damageCd: 0,
    hitStun: 0,
    checkpoint: { floor: 0, y: 360, x: W / 2, coins: 0, rescued: 0, supplies: 0, armor: 0 },
    player: {
      x: W / 2,
      y: 360,
      vx: 0,
      vy: 0,
      dir: 1,
      hp: startingMaxHp,
      maxHp: startingMaxHp,
      ground: null,
      step: 0,
      runDust: 0,
      oilTrailCd: 0
    },
    platforms: [],
    pickups: [],
    drones: [],
    lasers: [],
    monsters: [],
    anomalies: [],
    particles: [],
    oilTrail: [],
    texts: []
  };

  const start = platform(118, 360, 212, "safe", 0);
  start.seen = true;
  state.platforms.push(start);
  state.player.ground = start;
  while (state.lastGenY < H + WORLD_BOTTOM_PAD) generatePlatform();
  addText(W / 2, 184, missionTitle(), COLORS.gold);
  addText(W / 2, 220, "请先完成当前星球目标", COLORS.cream);
  if (state.earthCleared && stageIndex > 0) addText(W / 2, 256, "限时活动未开放", COLORS.red);
}

function platform(x, y, w, type, floor) {
  return {
    x,
    y,
    w,
    h: 14,
    baseX: x,
    type,
    floor,
    phase: rand(floor * 13.17) * Math.PI * 2,
    amp: 18 + rand(floor * 3.9) * 22,
    speed: 0.8 + rand(floor * 7.1) * 0.75,
    dx: 0,
    breakTime: 0,
    spring: 0,
    gone: false,
    seen: false,
    rewardTaken: false
  };
}

function generatePlatform() {
  const floor = state.nextFloor++;
  const depth = Math.max(0, floor - 1);
  const difficulty = Math.min(1, depth / 110);
  const gap = 78 + rand(floor * 4.33) * 32 + difficulty * 38;
  state.lastGenY += gap;

  const minW = 54;
  const maxW = 178;
  const w = clamp(maxW - difficulty * 105 + rand(floor * 2.2) * 36, minW, maxW);
  const x = 18 + rand(floor * 9.73) * (W - 36 - w);
  let type = "normal";
  const r = rand(floor * 5.91);

  if (floor % 20 === 0) type = "checkpoint";
  else if (floor === 3 || (floor > 3 && r < 0.14 + difficulty * 0.08)) type = "trampoline";
  else if (floor > 14 && r > 0.9 - difficulty * 0.18) type = "moving";
  else if (floor > 9 && r > 0.72 - difficulty * 0.14) type = "cracked";
  else if (floor > 6 && r > 0.56 - difficulty * 0.14) type = "spike";

  const p = platform(x, state.lastGenY, w, type, floor);
  state.platforms.push(p);

  if (floor > 2) {
    if (floor % 17 === 0) addPickup("medal", p);
    else if (floor % 13 === 0) addPickup("medkit", p);
    else if (floor % 9 === 0) addPickup("hostage", p);
    else if (floor % 5 === 0) addPickup("crate", p);
    else if (floor % 7 === 0) addPickup("barrel", p);
  }

  if (floor > 24 && floor % 11 === 4) {
    state.drones.push({
      y: p.y - 46,
      floor,
      phase: rand(floor * 19.1) * Math.PI * 2,
      speed: 0.85 + difficulty * 1.1,
      amp: 120 + rand(floor * 2.7) * 75,
      x: W / 2,
      hit: false
    });
  }

  if (state.earthCleared && state.stageIndex > 0 && floor > 10) {
    const monsterEvery = state.stageIndex >= 3 ? 7 : 9;
    if (floor % monsterEvery === 2 || (state.stageIndex >= 4 && floor % 13 === 6)) addMonster(monsterTypeForStage(state.stageIndex), p, difficulty);
  }

  const laserEvery = Math.max(5, Math.floor(10 - difficulty * 4));
  if (floor > 14 && floor % laserEvery === 3) {
    state.lasers.push({
      y: p.y - gap * (0.42 + rand(floor * 6.22) * 0.2),
      floor,
      phase: rand(floor * 12.7) * 3.6,
      period: 2.75 - difficulty * 0.85,
      warning: 0.58,
      duration: 0.82 + difficulty * 0.38,
      side: rand(floor * 2.4) > 0.5 ? 1 : -1
    });
  }
}

function addPickup(type, p) {
  const margin = Math.min(24, p.w * 0.25);
  const x = p.x + margin + rand(p.floor * 10.4) * Math.max(8, p.w - margin * 2);
  state.pickups.push({
    type,
    x,
    y: p.y - 35,
    floor: p.floor,
    taken: false,
    pulse: rand(p.floor * 8.2) * Math.PI * 2
  });
}

function addMonster(type, p, difficulty) {
  const side = rand(p.floor * 4.71) > 0.5 ? 1 : -1;
  const margin = Math.min(28, p.w * 0.24);
  const x = p.x + margin + rand(p.floor * 14.2) * Math.max(10, p.w - margin * 2);
  state.monsters.push({
    type,
    x,
    y: p.y - (type === "jupiter" ? 72 : 42),
    baseX: x,
    baseY: p.y - (type === "jupiter" ? 72 : 42),
    floor: p.floor,
    platformX: p.x,
    platformW: p.w,
    dir: side,
    phase: rand(p.floor * 15.3) * Math.PI * 2,
    speed: 0.85 + difficulty * 0.75 + (type === "jupiter" ? 0.35 : 0),
    hitCd: 0,
    remove: false
  });
}

function update(dt) {
  updateInteractions(dt);
  if (state.mode === "pause") return;
  updateParticles(dt);
  if (state.mode === "intro") {
    state.time += dt;
    return;
  }
  if (state.mode === "ad") {
    updateAdGate(dt);
    return;
  }
  if (state.mode === "swarm") {
    updateSwarm(dt);
    return;
  }
  if (state.mode === "menu" || state.mode === "over" || state.mode === "clear") {
    state.time += dt;
    return;
  }
  if (state.mode !== "play") return;

  state.time += dt;
  state.shield = Math.max(0, state.shield - dt);
  state.adShieldCd = Math.max(0, state.adShieldCd - dt);
  state.damageCd = Math.max(0, state.damageCd - dt);
  state.hitStun = Math.max(0, state.hitStun - dt);
  state.dashCd = Math.max(0, (state.dashCd || 0) - dt);
  state.scrollSpeed = Math.min(235, 46 + state.maxFloor * 0.74);

  while (state.lastGenY < state.cameraY + H + WORLD_BOTTOM_PAD) generatePlatform();
  updatePlatforms(dt);
  updatePlayer(dt);
  updateOilTrail(dt);
  updatePickups();
  updateMonsters(dt);
  updateDrones(dt);
  updateLasers(dt);
  updateCamera(dt);
  trimWorld();
  checkMissionClear();
  checkLose();
}

function addInteraction(x, y, kind = "tap") {
  interactions.push({ x, y, kind, t: 0, life: kind === "intro" ? 0.75 : 0.42 });
  if (interactions.length > 16) interactions.shift();
}

function addButtonClickEffect(b, x, y) {
  interactions.push({
    x,
    y,
    kind: "button",
    t: 0,
    life: 0.34,
    bx: b.x,
    by: b.y,
    bw: b.w,
    bh: b.h,
    feedback: b.feedback || "rect",
    cx: b.cx,
    cy: b.cy,
    radius: b.radius
  });
  if (interactions.length > 20) interactions.shift();
}

function updateInteractions(dt) {
  for (let i = interactions.length - 1; i >= 0; i--) {
    interactions[i].t += dt;
    if (interactions[i].t >= interactions[i].life) interactions.splice(i, 1);
  }
}

function updatePlatforms(dt) {
  for (const p of state.platforms) {
    p.dx = 0;
    if (p.gone) continue;
    if (p.type === "moving") {
      const oldX = p.x;
      p.x = p.baseX + Math.sin(state.time * p.speed + p.phase) * p.amp;
      p.x = clamp(p.x, 16, W - 16 - p.w);
      p.dx = p.x - oldX;
    }
    p.spring = Math.max(0, p.spring - dt * 4.8);
    if (p.breakTime > 0) {
      p.breakTime -= dt;
      if (p.breakTime <= 0) {
        p.gone = true;
        burst(p.x + p.w / 2, p.y - state.cameraY, "#b89a68", 18);
        if (state.player.ground === p) state.player.ground = null;
      }
    }
  }
}

function updatePlayer(dt) {
  const p = state.player;
  const control = state.hitStun > 0 ? 0.22 : 1;
  const dir = inputDir() * control;
  const targetVx = dir * 295;
  p.vx += (targetVx - p.vx) * Math.min(1, dt * 13);
  p.x = clamp(p.x + p.vx * dt, 24, W - 24);
  if (Math.abs(dir) > 0.05) p.dir = dir > 0 ? 1 : -1;
  p.step += Math.abs(p.vx) * dt * 0.055;
  p.runDust = Math.max(0, p.runDust - dt);
  p.oilTrailCd = Math.max(0, p.oilTrailCd - dt);

  if (p.ground && !p.ground.gone && isOnPlatform(p, p.ground)) {
    p.x = clamp(p.x + p.ground.dx, 24, W - 24);
  }

  const prevY = p.y;
  p.vy = clamp(p.vy + 1080 * dt, -500, 820);
  p.y += p.vy * dt;

  let landed = null;
  if (p.vy >= 0) {
    for (const plat of state.platforms) {
      if (plat.gone) continue;
      if (prevY <= plat.y && p.y >= plat.y && p.y <= plat.y + 30 && isOnPlatform(p, plat)) {
        landed = plat;
        break;
      }
    }
  }

  if (landed) {
    const freshLanding = p.ground !== landed || p.vy > 90;
    p.y = landed.y;
    p.vy = 0;
    p.ground = landed;
    state.maxFloor = Math.max(state.maxFloor, landed.floor);
    if (!landed.seen) {
      landed.seen = true;
      addText(landed.x + landed.w / 2, landed.y - state.cameraY - 22, landed.floor + "层", COLORS.gold);
      burst(landed.x + landed.w / 2, landed.y - state.cameraY, "rgba(216,202,153,0.9)", 8);
    }
    if (freshLanding && landed.type === "cracked") landed.breakTime = landed.breakTime || 0.68;
    if (freshLanding && landed.type === "spike") hurtPlayer(36, "尖刺", p.dir * -1);
    if (freshLanding && landed.type === "trampoline") {
      landed.spring = 1;
      p.vy = hasPlayerSkill("springBoost") ? -700 : -620;
      p.ground = null;
      p.y = landed.y - 2;
      addText(landed.x + landed.w / 2, landed.y - state.cameraY - 34, "弹!", COLORS.cyan);
      burst(landed.x + landed.w / 2, landed.y - state.cameraY - 8, "rgba(132,233,255,0.95)", 18);
    }
    if (landed.type === "checkpoint" && !landed.rewardTaken) {
      landed.rewardTaken = true;
      state.coins += 50;
      state.player.hp = Math.min(state.player.maxHp, state.player.hp + 22);
      saveCheckpoint(landed);
      addText(W / 2, landed.y - state.cameraY - 32, "勘探站 +50", COLORS.green);
      burst(landed.x + landed.w / 2, landed.y - state.cameraY, COLORS.green, 20);
    }
  } else {
    p.ground = null;
  }

  if (p.ground && Math.abs(p.vx) > 82 && p.runDust <= 0) {
    const runSpeed = clamp(Math.abs(p.vx) / 295, 0, 1);
    p.runDust = 0.075 - runSpeed * 0.026;
    state.particles.push({
      x: p.x - p.dir * (14 + Math.random() * 10),
      y: p.y - state.cameraY + 5,
      vx: -p.dir * (42 + runSpeed * 58 + Math.random() * 44),
      vy: -12 - Math.random() * 24,
      life: 0.22 + runSpeed * 0.08,
      maxLife: 0.22 + runSpeed * 0.08,
      color: "rgba(218,207,174,0.45)",
      r: 1.8 + Math.random() * 2.9
    });
    if (runSpeed > 0.54) {
      state.particles.push({
        x: p.x - p.dir * (20 + Math.random() * 16),
        y: p.y - state.cameraY + 1 + Math.random() * 8,
        vx: -p.dir * (82 + Math.random() * 70),
        vy: -4 - Math.random() * 16,
        life: 0.18,
        maxLife: 0.18,
        color: "rgba(14,15,13,0.64)",
        r: 2.4 + Math.random() * 3.8
      });
    }
  }

  if ((Math.abs(p.vx) > 54 || Math.abs(p.vy) > 120) && p.oilTrailCd <= 0) {
    p.oilTrailCd = p.ground ? 0.055 : 0.08;
    addOilTrailDrop(p);
  }
}

function addOilTrailDrop(p) {
  if (!state.oilTrail) state.oilTrail = [];
  const airborne = !p.ground;
  const speed = clamp(Math.abs(p.vx) / 295, 0, 1);
  state.oilTrail.push({
    x: p.x - p.dir * (18 + Math.random() * 10),
    y: p.y - (airborne ? 30 : 8) + Math.random() * 6,
    vx: -p.dir * (10 + speed * 42 + Math.random() * 18),
    vy: airborne ? 18 + Math.random() * 42 : -8 - Math.random() * 12,
    life: airborne ? 0.62 : 0.88,
    maxLife: airborne ? 0.62 : 0.88,
    r: 3.2 + Math.random() * 3.8,
    stretch: airborne ? 1.4 + Math.random() * 0.6 : 0.36 + Math.random() * 0.24,
    seed: Math.random() * Math.PI * 2
  });
  if (state.oilTrail.length > 44) state.oilTrail.splice(0, state.oilTrail.length - 44);
}

function updateOilTrail(dt) {
  if (!state.oilTrail) return;
  for (let i = state.oilTrail.length - 1; i >= 0; i--) {
    const drop = state.oilTrail[i];
    drop.life -= dt;
    drop.x += drop.vx * dt;
    drop.y += drop.vy * dt;
    drop.vy += 160 * dt;
    drop.r += dt * 2.2;
    if (drop.life <= 0 || drop.y < state.cameraY - 140 || drop.y > state.cameraY + H + 160) {
      state.oilTrail.splice(i, 1);
    }
  }
}

function updatePickups() {
  const p = state.player;
  for (const item of state.pickups) {
    if (item.taken) continue;
    const targetY = p.y - 34;
    if (hasPlayerSkill("magnet")) {
      const dx = p.x - item.x;
      const dy = targetY - item.y;
      const dist = Math.hypot(dx, dy);
      if (dist < 118) {
        item.x += dx * 0.08;
        item.y += dy * 0.08;
      }
    }
    const pickupX = hasPlayerSkill("magnet") ? 44 : 30;
    const pickupY = hasPlayerSkill("magnet") ? 56 : 40;
    if (Math.abs(p.x - item.x) < pickupX && Math.abs(targetY - item.y) < pickupY) {
      item.taken = true;
      if (item.type === "hostage") {
        state.rescued++;
        state.coins += 75;
        addText(item.x, item.y - state.cameraY - 18, "油样 +75", COLORS.cyan);
        burst(item.x, item.y - state.cameraY, COLORS.cyan, 18);
      } else if (item.type === "barrel") {
        state.coins += 95;
        addText(item.x, item.y - state.cameraY - 18, "原油桶 +95", COLORS.gold);
        burst(item.x, item.y - state.cameraY, "rgba(255,126,44,0.95)", 16);
      } else if (item.type === "medal") {
        state.coins += 150;
        state.armor = Math.min(state.maxArmor, state.armor + 10);
        addText(item.x, item.y - state.cameraY - 22, "勋章 +150", COLORS.gold);
        addText(item.x, item.y - state.cameraY + 2, "护甲 +10", COLORS.green);
        burst(item.x, item.y - state.cameraY, COLORS.gold, 24);
      } else if (item.type === "crate") {
        const xp = supplyCrateXp();
        state.supplies++;
        state.coins += 42;
        grantPlayerXp(xp, item.x, item.y - state.cameraY - 42, "补给箱");
        if (hasPlayerSkill("crateArmor")) {
          state.armor = Math.min(state.maxArmor, state.armor + 12);
          addText(item.x, item.y - state.cameraY + 4, "护甲 +12", COLORS.green);
        }
        addText(item.x, item.y - state.cameraY - 18, "补给箱 +1", "rgba(210,235,220,0.92)");
        burst(item.x, item.y - state.cameraY, "rgba(20,24,22,0.95)", 14);
      } else {
        const heal = hasPlayerSkill("medic") ? 40 : 26;
        state.player.hp = Math.min(state.player.maxHp, state.player.hp + heal);
        addText(item.x, item.y - state.cameraY - 18, "治疗 +" + heal, COLORS.green);
        burst(item.x, item.y - state.cameraY, COLORS.green, 14);
      }
    }
  }
}

function updateDrones(dt) {
  const p = state.player;
  for (const d of state.drones) {
    d.x = W / 2 + Math.sin(state.time * d.speed + d.phase) * d.amp;
    if (!d.hit && Math.abs(p.x - d.x) < 26 && Math.abs((p.y - 36) - d.y) < 26) {
      d.hit = true;
      hurtPlayer(42, "巡逻无人机", p.x < d.x ? -1 : 1);
      p.vx += p.x < d.x ? -240 : 240;
      burst(d.x, d.y - state.cameraY, COLORS.red, 16);
    }
    if (d.hit && d.y < state.cameraY - 80) d.remove = true;
  }
}

function updateMonsters(dt) {
  const p = state.player;
  for (const m of state.monsters) {
    m.hitCd = Math.max(0, (m.hitCd || 0) - dt);
    if (m.type === "moon") {
      const left = m.platformX + 20;
      const right = m.platformX + m.platformW - 20;
      m.x += m.dir * (34 + m.speed * 18) * dt;
      if (m.x < left || m.x > right) {
        m.x = clamp(m.x, left, right);
        m.dir *= -1;
      }
      m.y = m.baseY + Math.sin(state.time * 5 + m.phase) * 2.5;
    } else if (m.type === "mars") {
      m.x = m.baseX + Math.sin(state.time * (1.7 + m.speed * 0.3) + m.phase) * 18;
      m.y = m.baseY + Math.sin(state.time * 4.2 + m.phase) * 7;
    } else {
      m.x = W / 2 + Math.sin(state.time * (0.85 + m.speed * 0.34) + m.phase) * (112 + state.stageIndex * 8);
      m.y = m.baseY + Math.sin(state.time * 3.2 + m.phase) * 18;
    }

    const dx = p.x - m.x;
    const dy = (p.y - 34) - m.y;
    const hitRadius = m.type === "jupiter" ? 46 : 36;
    if (m.hitCd <= 0 && Math.hypot(dx, dy) < hitRadius) {
      m.hitCd = 1.1;
      const damage = m.type === "moon" ? 28 : m.type === "mars" ? 34 : 38;
      hurtPlayer(damage, monsterLabel(m.type), dx < 0 ? -0.65 : 0.65);
      p.vx = clamp(p.vx + (dx < 0 ? -90 : 90), -260, 260);
      p.vy = Math.min(p.vy, -170);
      burst(m.x, m.y - state.cameraY, monsterColor(m.type), 18);
    }
    if (m.y < state.cameraY - 160) m.remove = true;
  }
}

function monsterLabel(type) {
  if (type === "moon") return "月尘闪电";
  if (type === "mars") return "火星异常流";
  return "木星风暴";
}

function monsterColor(type) {
  if (type === "moon") return "rgba(210,210,196,0.94)";
  if (type === "mars") return "rgba(255,76,34,0.94)";
  return "rgba(218,140,62,0.94)";
}

function updateLasers(dt) {
  const p = state.player;
  for (const l of state.lasers) {
    const info = laserState(l);
    if (info.active && Math.abs((p.y - 36) - l.y) < 14 && p.x > 42 && p.x < W - 42) {
      hurtPlayer(38, "激光扫射", l.side * 0.35);
      p.vx = clamp(p.vx + l.side * 34, -220, 220);
      burst(p.x, p.y - state.cameraY - 38, "#ff3d32", 12);
    }
  }
}

function updateCamera(dt) {
  state.cameraY = Math.max(0, state.cameraY + state.scrollSpeed * dt);
}

function trimWorld() {
  const top = state.cameraY - 160;
  state.platforms = state.platforms.filter(p => p.y > top && !p.remove);
  state.pickups = state.pickups.filter(p => p.y > top && !p.taken);
  state.drones = state.drones.filter(d => d.y > top && !d.remove);
  state.lasers = state.lasers.filter(l => l.y > top);
  state.monsters = state.monsters.filter(m => m.y > top && !m.remove);
}

function checkLose() {
  const p = state.player;
  if (p.hp <= 0) return endGame(TEXT.lostHp);
  if (p.y - state.cameraY < (hasPlayerSkill("deepBreath") ? 38 : 56)) return endGame(TEXT.lostTop);
  if (p.y - state.cameraY > H + 44) return endGame(TEXT.lostFall);
}

function checkMissionClear() {
  if (state.mode !== "play" || state.missionClearAwarded || state.maxFloor < state.levelTarget) return;
  state.missionClearAwarded = true;
  const beforeRank = rankTitle();
  const xpEarned = 950 + state.levelTarget * 3 + state.rescued * 50 + state.supplies * 30;
  const coinsEarned = 650 + state.coins + state.rescued * 75 + state.supplies * 42;
  state.coins += coinsEarned;
  grantPlayerXp(xpEarned, W / 2, 330, "任务");
  const afterRank = rankTitle();
  state.levelClear = {
    xpEarned,
    coinsEarned,
    beforeRank,
    afterRank,
    floor: state.maxFloor,
    stars: 3
  };
  state.best = Math.max(state.best, state.maxFloor);
  localStorage.setItem("rescueDepthBest", String(state.best));
  if (state.stageIndex === 0) {
    markEarthCleared();
    state.earthCleared = true;
  }
  state.mode = "clear";
  touch.active = false;
  touch.id = null;
  touch.dir = 0;
  burst(W / 2, 290, COLORS.gold, 32);
}

function endGame(reason) {
  if (state.mode !== "play") return;
  state.mode = "over";
  state.endReason = reason;
  state.best = Math.max(state.best, state.maxFloor);
  localStorage.setItem("rescueDepthBest", String(state.best));
}

function reviveByAd() {
  if (state.mode !== "over") return;
  state.mode = "ad";
  state.adGate = {
    t: 3,
    total: 3,
    target: state.checkpoint.floor > 0 ? "checkpoint" : "restart"
  };
}

function togglePause() {
  if (state.mode === "play") {
    state.mode = "pause";
    touch.active = false;
    touch.id = null;
    touch.dir = 0;
    touch.x = JOYSTICK.x;
    touch.y = JOYSTICK.y;
  } else if (state.mode === "pause") {
    state.mode = "play";
  }
}

function updateAdGate(dt) {
  if (!state.adGate) return;
  state.adGate.t -= dt;
  if (state.adGate.t > 0) return;

  const target = state.adGate.target;
  state.adGate = null;
  if (target === "checkpoint" && state.checkpoint.floor > 0) {
    reviveFromCheckpoint();
  } else {
    startGame();
  }
}

function reviveFromCheckpoint() {
  if (state.checkpoint.floor <= 0) return startGame();
  const cp = { ...state.checkpoint };
  state.mode = "play";
  state.endReason = "";
  state.cameraY = Math.max(0, cp.y - 430);
  state.nextFloor = cp.floor + 1;
  state.lastGenY = cp.y;
  state.maxFloor = cp.floor;
  state.coins = cp.coins;
  state.rescued = cp.rescued;
  state.supplies = cp.supplies;
  state.armor = cp.armor;
  state.platforms = [];
  state.pickups = [];
  state.drones = [];
  state.lasers = [];
  state.particles = [];
  state.texts = [];
  state.player.hp = Math.min(state.player.maxHp, Math.max(82, Math.floor(state.player.maxHp * 0.72)));
  state.player.vx = 0;
  state.player.vy = 0;
  state.player.x = cp.x;
  state.player.y = cp.y;
  state.player.ground = null;
  state.player.runDust = 0;
  state.hitStun = 0;
  state.damageCd = 0;
  state.dashCd = 0;
  state.shield = 3;
  const safe = platform(112, cp.y, 224, "checkpoint", cp.floor);
  safe.seen = true;
  state.platforms.push(safe);
  state.player.ground = safe;
  while (state.lastGenY < state.cameraY + H + WORLD_BOTTOM_PAD) generatePlatform();
  addText(W / 2, 390, "第 " + cp.floor + " 层存档复活", COLORS.green);
}

function doubleCoinsByAd() {
  if (state.doubleUsed) return;
  state.doubleUsed = true;
  state.coins *= 2;
  addText(W / 2, 486, "奖励已翻倍", COLORS.gold);
}

function activateShield() {
  if (state.mode !== "play" || state.adShieldCd > 0) return;
  state.adArmorViews++;
  state.armor = Math.min(state.maxArmor, state.armor + 30);
  state.adShieldCd = 1.2;
  if (state.adArmorViews % 3 === 0) {
    state.shield = 10;
    addText(W - 96, 748, "广告护盾：无敌10秒", COLORS.green);
  } else {
    addText(W - 92, 748, "护甲 +30  " + (state.adArmorViews % 3) + "/3", COLORS.green);
  }
}

function activateDash() {
  if (state.mode !== "play") return;
  if (!hasPlayerSkill("dash")) {
    addText(W - 82, 842, "LV5 解锁冲刺", "rgba(246,234,212,0.72)");
    return;
  }
  if ((state.dashCd || 0) > 0) return;
  const p = state.player;
  const dir = inputDir() || p.dir || 1;
  p.dir = dir > 0 ? 1 : -1;
  p.vx = p.dir * 540;
  p.vy = Math.min(p.vy, -86);
  p.ground = null;
  state.dashCd = dashCooldownMax();
  p.oilTrailCd = 0;
  for (let i = 0; i < 5; i++) addOilTrailDrop(p);
  burst(p.x - p.dir * 18, p.y - state.cameraY - 26, COLORS.gold, 16);
  addText(p.x, p.y - state.cameraY - 68, "冲刺!", COLORS.gold);
}

function hurtPlayer(amount, source = "伤害", knockDir = 0) {
  if (state.damageCd > 0) return;
  state.damageCd = 0.86;
  if (state.shield > 0) {
    addText(state.player.x, state.player.y - state.cameraY - 78, "无敌抵挡", COLORS.green);
    return;
  }
  let hpDamage = hasPlayerSkill("oilGuard") ? Math.ceil(amount * 0.85) : amount;
  if (state.armor > 0) {
    const armorHit = Math.min(state.armor, Math.ceil(hpDamage * 0.72));
    state.armor -= armorHit;
    hpDamage = Math.max(8, hpDamage - Math.floor(armorHit * 0.55));
  }
  const oilLoss = Math.min(state.coins, Math.ceil(hpDamage * 1.7));
  state.coins -= oilLoss;
  state.player.hp -= hpDamage;
  state.player.vy = -315;
  state.player.vx += (knockDir || -state.player.dir) * 180;
  state.hitStun = 0.42;
  addText(state.player.x, state.player.y - state.cameraY - 80, source + " -" + hpDamage, COLORS.red);
  if (oilLoss > 0) addText(state.player.x, state.player.y - state.cameraY - 58, "石油掉落 -" + oilLoss, COLORS.gold);
}

function saveCheckpoint(landed) {
  if (landed.floor <= state.checkpoint.floor || landed.floor % 20 !== 0) return;
  state.checkpoint = {
    floor: landed.floor,
    y: landed.y,
    x: clamp(landed.x + landed.w / 2, 48, W - 48),
    coins: state.coins,
    rescued: state.rescued,
    supplies: state.supplies,
    armor: state.armor
  };
  addText(W / 2, landed.y - state.cameraY - 54, "已存档第" + landed.floor + "层", COLORS.cyan);
}

function laserState(l) {
  const cycle = (state.time + l.phase) % l.period;
  return {
    warning: cycle < l.warning,
    active: cycle >= l.warning && cycle < l.warning + l.duration,
    pct: cycle / l.period
  };
}

function isOnPlatform(p, plat) {
  return p.x > plat.x - 16 && p.x < plat.x + plat.w + 16;
}

function inputDir() {
  let dir = touch.active ? touch.dir : 0;
  if (keys.ArrowLeft || keys.KeyA) dir -= 1;
  if (keys.ArrowRight || keys.KeyD) dir += 1;
  return clamp(dir, -1, 1);
}

function draw() {
  ctx.clearRect(0, 0, innerWidth, innerHeight);
  ctx.save();
  ctx.translate(ox, oy);
  ctx.scale(scale, scale);
  buttons = [];
  if (state.mode === "intro") {
    drawIntro();
    drawInteractions();
    ctx.restore();
    return;
  }
  if (state.mode === "menu") {
    drawMainMenu();
    drawInteractions();
    ctx.restore();
    return;
  }
  if (state.mode === "swarm") {
    drawSwarm();
    drawInteractions();
    ctx.restore();
    return;
  }
  drawBackground();
  drawWorld();
  drawFog();
  drawHud();
  if (state.mode === "over") drawGameOver();
  if (state.mode === "clear") drawMissionClearOverlay();
  if (state.mode === "ad") drawAdGate();
  if (state.mode === "pause") drawPauseOverlay();
  drawInteractions();
  ctx.restore();
}

function drawIntro() {
  const t = state.time || 0;
  ctx.fillStyle = "#06141d";
  ctx.fillRect(0, 0, W, H);
  if (introReady) {
    const scaleImg = Math.max(W / introImage.naturalWidth, H / introImage.naturalHeight);
    const drawW = introImage.naturalWidth * scaleImg;
    const drawH = introImage.naturalHeight * scaleImg;
    ctx.drawImage(introImage, (W - drawW) / 2, (H - drawH) / 2, drawW, drawH);
  } else {
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, "#10283a");
    g.addColorStop(1, "#071014");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
    label("OPERATION CORE", W / 2, H / 2, 30, COLORS.gold);
  }

  const pulse = 0.5 + Math.sin(t * 5) * 0.5;
  const y = H - 47;
  ctx.fillStyle = "rgba(6,14,18,0.54)";
  round(56, y - 26, W - 112, 44, 10, true);
  ctx.strokeStyle = "rgba(240,206,109," + (0.42 + pulse * 0.36) + ")";
  ctx.lineWidth = 1.8;
  round(56, y - 26, W - 112, 44, 10, false);
  label("点击开始  >>>>", W / 2, y + 3, 18 + pulse * 1.2, COLORS.gold);
}

function drawInteractions() {
  for (const fx of interactions) {
    const p = fx.t / fx.life;
    if (fx.kind === "button") {
      const pulse = Math.sin(Math.min(1, p) * Math.PI);
      ctx.save();
      ctx.globalAlpha = Math.max(0, 1 - p * 0.72);
      if (fx.feedback === "circle") {
        const cx = fx.cx || fx.x;
        const cy = fx.cy || fx.y;
        const r = fx.radius || Math.min(fx.bw, fx.bh) / 2;
        ctx.fillStyle = "rgba(255,220,116," + (0.1 + pulse * 0.16).toFixed(3) + ")";
        circle(cx, cy, Math.max(4, r - 2 + pulse * 5));
        ctx.strokeStyle = "rgba(255,229,146," + (0.76 - p * 0.38).toFixed(3) + ")";
        ctx.lineWidth = 2.2 + pulse * 2.2;
        circleStroke(cx, cy, r + pulse * 8);
      } else {
        const inset = 3 + pulse * 5;
        ctx.fillStyle = "rgba(255,220,116," + (0.12 + pulse * 0.18).toFixed(3) + ")";
        round(fx.bx + inset, fx.by + inset, fx.bw - inset * 2, fx.bh - inset * 2, 8, true);
        ctx.strokeStyle = "rgba(255,229,146," + (0.72 - p * 0.36).toFixed(3) + ")";
        ctx.lineWidth = 2.2 + pulse * 2.2;
        round(fx.bx - pulse * 2, fx.by - pulse * 2, fx.bw + pulse * 4, fx.bh + pulse * 4, 10, false);
      }
      ctx.strokeStyle = "rgba(255,244,198," + (0.42 * (1 - p)).toFixed(3) + ")";
      ctx.lineWidth = 1.2;
      circleStroke(fx.x, fx.y, 8 + p * 38);
      ctx.restore();
      continue;
    }
    const radius = (fx.kind === "intro" ? 34 : 20) + p * (fx.kind === "intro" ? 150 : 56);
    ctx.save();
    ctx.globalAlpha = Math.max(0, 1 - p);
    ctx.strokeStyle = fx.kind === "intro" ? "rgba(240,206,109,0.72)" : "rgba(255,238,170,0.62)";
    ctx.lineWidth = 2.4;
    circleStroke(fx.x, fx.y, radius);
    ctx.fillStyle = fx.kind === "intro" ? "rgba(240,206,109,0.08)" : "rgba(255,238,170,0.1)";
    circle(fx.x, fx.y, radius * 0.46);
    ctx.restore();
  }
}

function drawMainMenu() {
  drawMenuBackdrop();
  drawMenuPlayerCard();
  drawStableMenuStageSelector();
  for (let i = 0; i < MENU_STAGE_BUTTONS.length; i++) {
    const b = MENU_STAGE_BUTTONS[i];
    pushCanvasButton(b.x, b.y, b.w, b.h, () => setMenuStage(i));
  }
  drawPlanetCarousel();
  drawMenuCharacter();
  drawMenuLaunchBar();
  drawMenuTicker();
  drawParticles();
  clearDepthPreviewSideArtifacts();
  if (state.skillPanelOpen) drawSkillPanelOverlay();
}

function menuPlateRect(x, y, w, h) {
  return {
    x: x / MENU_PLATE_SOURCE.w * W,
    y: y / MENU_PLATE_SOURCE.h * H,
    w: w / MENU_PLATE_SOURCE.w * W,
    h: h / MENU_PLATE_SOURCE.h * H
  };
}

function menuPlatePoint(x, y) {
  return {
    x: x / MENU_PLATE_SOURCE.w * W,
    y: y / MENU_PLATE_SOURCE.h * H
  };
}

function pushMenuPlateButton(x, y, w, h, fn) {
  const r = menuPlateRect(x, y, w, h);
  buttons.push({ x: r.x, y: r.y, w: r.w, h: r.h, fn });
  return r;
}

function pushCanvasButton(x, y, w, h, fn, extra = null) {
  buttons.push({ x, y, w, h, fn, ...(extra || {}) });
}

function menuDepthPlatePath(stageIndex, depthIndex) {
  const stagePaths = MENU_STAGE_DEPTH_PLATE_PATHS[stageIndex];
  return (stagePaths && stagePaths[depthIndex]) || MENU_PLATE_PATHS[depthIndex] || MENU_PLATE_PATHS[MENU_BASE_PLATE_INDEX];
}

function menuDepthPlateImage(stageIndex, depthIndex) {
  const path = menuDepthPlatePath(stageIndex, depthIndex);
  return menuPlateImages[path] || null;
}

function menuDepthDisplayItem(stageIndex, depthIndex) {
  const depth = MENU_DEPTHS[depthIndex] || MENU_DEPTHS[0];
  if (stageIndex === MENU_DEEP_SPACE_STAGE_INDEX) {
    return { ...depth, name: MENU_DEEP_SPACE_DEPTH_NAME };
  }
  return depth;
}

function menuDepthKmValue(depth) {
  const value = Number(String(depth.km || "0").replace(/,/g, ""));
  return Number.isFinite(value) ? value : 0;
}

function menuTime() {
  return state ? state.time || 0 : performance.now() / 1000;
}

function drawMenuOrbitArcs(x, y, r, phase = 0) {
  const t = menuTime();
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(t * 1.45 + phase);
  ctx.globalCompositeOperation = "lighter";
  ctx.lineCap = "round";
  ctx.lineWidth = 1.5;
  ctx.strokeStyle = "rgba(255,235,154,0.62)";
  for (let i = 0; i < 3; i++) {
    const start = i * Math.PI * 0.72;
    ctx.beginPath();
    ctx.arc(0, 0, r + i * 1.8, start, start + Math.PI * 0.22);
    ctx.stroke();
  }
  ctx.restore();
}

function currentMenuPlateImage() {
  return menuDepthPlateImage(menuStageIndex, menuDepthIndex);
}

function drawMenuPlate() {
  const basePlate = currentMenuPlateImage();
  const shellPlate = menuPlateImages[MENU_SHELL_PLATE_PATH] || basePlate;
  if (!shellPlate || !shellPlate.complete || !shellPlate.naturalWidth) return false;
  ctx.drawImage(shellPlate, 0, 0, W, H);
  drawStableMenuStageSelector();
  drawStableMenuDepthSelector(basePlate);
  drawStableMenuPreview(basePlate);
  drawUpgradedMenuAvatar();
  drawMenuLevelOverlay();
  clearBakedMenuCharacter();
  drawUpgradedMenuCharacter();
  drawMenuLaunchBar();

  for (let i = 0; i < MENU_STAGE_BUTTONS.length; i++) {
    const b = MENU_STAGE_BUTTONS[i];
    pushCanvasButton(b.x, b.y, b.w, b.h, () => setMenuStage(i));
  }

  for (let i = 0; i < MENU_DEPTH_BUTTONS.length; i++) {
    const b = MENU_DEPTH_BUTTONS[i];
    pushCanvasButton(b.x, b.y, b.w, b.h, () => setMenuDepth(i), {
      cx: b.x + b.w / 2,
      cy: 370,
      radius: i === menuDepthIndex ? 50 : 28,
      feedback: "circle"
    });
  }
  if (state.skillPanelOpen) drawSkillPanelOverlay();
  return true;
}

}

function drawMenuSkillOption(x, y, w, h) {

  ctx.restore();
}

function drawSkillPanelOverlay() {
  pushCanvasButton(0, 0, W, H, closeSkillPanel);
  ctx.save();
  ctx.fillStyle = "rgba(1,5,7,0.72)";
  ctx.fillRect(0, 0, W, H);

  const panelX = 34;
  const panelY = 196;
  const panelW = W - 68;
  const panelH = 560;
  ctx.fillStyle = "rgba(5,12,16,0.96)";
  round(panelX, panelY, panelW, panelH, 12, true);
  ctx.strokeStyle = "rgba(240,206,109,0.72)";
  ctx.lineWidth = 2;
  round(panelX, panelY, panelW, panelH, 12, false);

function menuDepthArtSample(plate) {
  if (!plate || !plate.complete || !plate.naturalWidth) return null;
  let best = MENU_DEPTH_ART_SAMPLES[0];
  let bestDelta = Math.abs(plate.naturalWidth - best.w);
  for (const sample of MENU_DEPTH_ART_SAMPLES) {
    const delta = Math.abs(plate.naturalWidth - sample.w);
    if (delta < bestDelta) {
      best = sample;
      bestDelta = delta;
    }
  }
  return best;
}

function menuDepthTextureCrop(path, plate, depthIndex) {
  const override = MENU_DEPTH_TEXTURE_CROPS[path];
  if (override) return override;
  const sample = menuDepthArtSample(plate);
  if (!sample) return null;
  return {
    x: sample.xs[depthIndex],
    y: sample.y,
    r: (sample.rs && sample.rs[depthIndex]) || sample.r
  };
}

function drawPlanetaryBlueprintBackdrop(stageIndex, t) {
  const theme = MENU_BLUEPRINT_THEMES[stageIndex] || MENU_BLUEPRINT_THEMES[0];
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, theme.bg[0]);
  bg.addColorStop(0.46, theme.bg[1]);
  bg.addColorStop(1, theme.bg[2]);
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  ctx.save();
  ctx.strokeStyle = theme.grid;
  ctx.lineWidth = 1;
  const drift = (t * 9) % 36;
  for (let x = -36 + drift; x < W + 36; x += 36) {
    ctx.beginPath();
    ctx.moveTo(x, 122);
    ctx.lineTo(x + 46, H - 88);
    ctx.stroke();
  }
  for (let y = 148 - drift; y < H; y += 42) {
    ctx.beginPath();
    ctx.moveTo(26, y);
    ctx.lineTo(W - 26, y);
    ctx.stroke();
  }

  const cx = W / 2;
  ctx.strokeStyle = theme.accent;
  ctx.globalAlpha = 0.24;
  ctx.lineWidth = 1.2;
  ctx.setLineDash([7, 10]);
  ctx.beginPath();
  ctx.moveTo(cx, 126);
  ctx.lineTo(cx, H - 106);
  ctx.stroke();
  ctx.setLineDash([]);
  for (let y = 178; y < H - 110; y += 74) {
    ctx.beginPath();
    ctx.moveTo(cx - 22, y);
    ctx.lineTo(cx + 22, y);
    ctx.stroke();
  }

  drawBlueprintTerrain(theme, stageIndex, t);
  drawBlueprintRadar(theme, t);
  drawBlueprintReadout(theme, t);
  ctx.restore();

  const vignette = ctx.createRadialGradient(W / 2, H * 0.45, W * 0.18, W / 2, H * 0.52, W * 0.78);
  vignette.addColorStop(0, "rgba(0,0,0,0.02)");
  vignette.addColorStop(1, "rgba(0,0,0,0.46)");
  ctx.fillStyle = vignette;
  ctx.fillRect(0, 0, W, H);
}

function drawBlueprintTerrain(theme, stageIndex, t) {
  const baseY = 618;
  ctx.save();
  ctx.globalAlpha = 0.78;
  ctx.fillStyle = theme.terrain2;
  ctx.strokeStyle = theme.terrain;
  ctx.lineWidth = 1.5;

  if (stageIndex === 1) {
    for (let i = 0; i < 7; i++) {
      const x = 46 + i * 58;
      const r = 12 + (i % 3) * 6;
      ctx.beginPath();
      ctx.ellipse(x, baseY + 38 + Math.sin(t * 0.4 + i) * 2, r * 1.5, r * 0.48, -0.18, 0, Math.PI * 2);
      ctx.stroke();
    }
  } else if (stageIndex === 3) {
    for (let i = 0; i < 7; i++) {
      const y = 412 + i * 42 + Math.sin(t * 0.3 + i) * 2;
      ctx.beginPath();
      ctx.moveTo(20, y);
      for (let x = 20; x <= W - 20; x += 34) {
        ctx.lineTo(x, y + Math.sin(x * 0.035 + i + t * 0.22) * (7 + i * 0.6));
      }
      ctx.stroke();
    }
    ctx.beginPath();
    ctx.ellipse(W - 104, 524, 52, 22, -0.18, 0, Math.PI * 2);
    ctx.stroke();
  } else if (stageIndex === 4) {
    for (let i = 0; i < 26; i++) {
      const x = (i * 73 + t * 8) % W;
      const y = 242 + ((i * 47) % 520);
      ctx.fillStyle = "rgba(183,173,255," + (0.08 + (i % 4) * 0.025).toFixed(3) + ")";
      circle(x, y, 0.8 + (i % 3) * 0.5);
    }
    ctx.strokeStyle = theme.terrain;
    ctx.beginPath();
    ctx.ellipse(W / 2, 620, 150, 38, 0, 0, Math.PI * 2);
    ctx.stroke();
  } else {
    ctx.beginPath();
    ctx.moveTo(0, baseY + 54);
    for (let x = 0; x <= W; x += 28) {
      const dune = stageIndex === 2 ? Math.sin(x * 0.03 + t * 0.16) * 24 : Math.sin(x * 0.025 + t * 0.12) * 15;
      const jag = stageIndex === 2 ? Math.sin(x * 0.09) * 8 : Math.sin(x * 0.05) * 4;
      ctx.lineTo(x, baseY + dune + jag);
    }
    ctx.lineTo(W, H);
    ctx.lineTo(0, H);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  }

  ctx.strokeStyle = theme.accent;
  ctx.globalAlpha = 0.2;
  for (let i = 0; i < 4; i++) {
    ctx.beginPath();
    ctx.ellipse(W / 2, 690, 82 + i * 34, 18 + i * 8, 0, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.restore();
}

function drawBlueprintRadar(theme, t) {
  ctx.save();
  ctx.globalAlpha = 0.2;
  ctx.strokeStyle = theme.accent;
  ctx.lineWidth = 1.1;
  const cx = W / 2;
  const cy = 650;
  for (let i = 0; i < 4; i++) {
    ctx.beginPath();
    ctx.arc(cx, cy, 44 + i * 34 + Math.sin(t * 1.2 + i) * 2, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.beginPath();
  ctx.moveTo(cx - 150, cy);
  ctx.lineTo(cx + 150, cy);
  ctx.moveTo(cx, cy - 88);
  ctx.lineTo(cx, cy + 88);
  ctx.stroke();
  ctx.restore();
}

function drawDepthIcon(x, y, r, item, selected) {
  const t = menuTime();
  ctx.save();
  const g = ctx.createRadialGradient(x - r * 0.32, y - r * 0.36, r * 0.18, x, y, r);
  g.addColorStop(0, item.colors[0]);
  g.addColorStop(0.55, item.colors[1]);
  g.addColorStop(1, item.colors[2]);
  ctx.fillStyle = "rgba(0,0,0,0.38)";
  ellipse(x, y + r + 10, r * 0.92, r * 0.2);
  if (selected) {
    const pulse = 0.5 + Math.sin(t * 3.4) * 0.5;
    const glow = ctx.createRadialGradient(x, y, r * 0.76, x, y, r * (1.42 + pulse * 0.18));
    glow.addColorStop(0, "rgba(240,206,109," + (0.28 + pulse * 0.12).toFixed(3) + ")");
    glow.addColorStop(1, "rgba(240,206,109,0)");
    ctx.fillStyle = glow;
    circle(x, y, r * (1.42 + pulse * 0.18));
  }
  ctx.fillStyle = g;
  circle(x, y, r);
  const pulse = selected ? 0.5 + Math.sin(t * 3.4) * 0.5 : 0;
  ctx.strokeStyle = selected ? "rgba(240,206,109," + (0.88 + pulse * 0.12).toFixed(3) + ")" : "rgba(214,176,104,0.48)";
  ctx.lineWidth = selected ? 4 + pulse * 0.6 : 2;
  circleStroke(x, y, r);
  if (selected) drawMenuOrbitArcs(x, y, r + 7, 0.8);
  ctx.strokeStyle = "rgba(255,237,178,0.28)";
  ctx.lineWidth = 1.4;
  ctx.beginPath();
  ctx.moveTo(x - r * 0.7, y - r * 0.12);
  ctx.quadraticCurveTo(x - r * 0.12, y - r * 0.34, x + r * 0.66, y - r * 0.1);
  ctx.stroke();
  const en = selected ? item.en : item.en.replace(" CORE", "");
  label(item.name, x, y + r + (selected ? 20 : 26), selected ? 20 : 15, selected ? "#fff4d7" : "rgba(246,234,212,0.72)");
  label(en, x, y + r + (selected ? 38 : 48), selected ? 12 : 9, selected ? COLORS.gold : "rgba(246,234,212,0.58)");
  ctx.restore();
}

function drawDepthGauge(x, y, currentKm = 3000, width = 154) {
  const t = menuTime();
  const maxKm = 5100;
  const pointerX = x + Math.max(0, Math.min(1, currentKm / maxKm)) * width;
  ctx.strokeStyle = "rgba(246,234,212,0.38)";
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x + width, y);
  ctx.stroke();
  for (let i = 0; i <= 10; i++) {
    const tx = x + (width / 10) * i;
    ctx.beginPath();
    ctx.moveTo(tx, y - (i % 2 ? 5 : 9));
    ctx.lineTo(tx, y + 5);
    ctx.stroke();
  }
  const glow = 0.5 + Math.sin(t * 4) * 0.5;
  ctx.save();
  ctx.globalCompositeOperation = "lighter";
  ctx.fillStyle = "rgba(240,206,109," + (0.08 + glow * 0.12).toFixed(3) + ")";
  circle(pointerX, y - 6, 18 + glow * 4);
  ctx.restore();
  ctx.fillStyle = COLORS.gold;
  ctx.beginPath();
  ctx.moveTo(pointerX - 5, y - 12);
  ctx.lineTo(pointerX + 5, y - 12);
  ctx.lineTo(pointerX, y + 1);
  ctx.closePath();
  ctx.fill();
  label("0", x, y + 20, 8, "rgba(246,234,212,0.6)");
  label("1,000", x + width * (1000 / maxKm), y + 20, 8, "rgba(246,234,212,0.6)");
  label("3,000", x + width * (3000 / maxKm), y + 20, 8, currentKm === 3000 ? COLORS.gold : "rgba(246,234,212,0.6)");
  label("5,100", x + width, y + 20, 8, "rgba(246,234,212,0.6)");
}

function drawMenuSprite(x, y, w, h, opts = {}) {
  if (playerSpriteReady) {
    const sprite = playerSpriteCanvas || playerSprite;
    const aspect = (sprite.width || w) / (sprite.height || h);
    let drawW = w;
    let drawH = w / aspect;
    if (drawH > h) {
      drawH = h;
        drawW = h * aspect;
    }
    const rotation = opts.rotation || 0;
    const squash = opts.squash || 1;
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rotation);
    ctx.scale(squash, 1 / squash);
    ctx.drawImage(sprite, -drawW / 2, -drawH, drawW, drawH);
    ctx.restore();
    return;
  }
  ctx.fillStyle = "#102237";
  circle(x, y - h * 0.48, w * 0.28);
  ctx.strokeStyle = "#f6ead4";
  ctx.lineWidth = 3;
  circleStroke(x, y - h * 0.48, w * 0.28);
}

function drawBackground() {
  drawStageArtBackground(state.stageIndex, 5);

  const shaft = ctx.createLinearGradient(0, 0, 0, H);
  shaft.addColorStop(0, "rgba(23,35,33,0.72)");
  shaft.addColorStop(0.56, "rgba(12,23,22,0.82)");
  shaft.addColorStop(1, "rgba(5,8,7,0.9)");
  ctx.fillStyle = shaft;
  round(42, -22, W - 84, H + 44, 28, true);

  const heat = Math.min(1, state.maxFloor / 140);
  const coreGlow = ctx.createRadialGradient(W / 2, H + 40, 40, W / 2, H + 40, 430);
  coreGlow.addColorStop(0, "rgba(255,122,34," + (0.22 + heat * 0.22) + ")");
  coreGlow.addColorStop(0.45, "rgba(126,39,18," + (0.12 + heat * 0.16) + ")");
  coreGlow.addColorStop(1, "rgba(0,0,0,0)");
  ctx.fillStyle = coreGlow;
  ctx.fillRect(0, 0, W, H);

  const lampGlow = ctx.createRadialGradient(W / 2, 214, 50, W / 2, 260, 390);
  lampGlow.addColorStop(0, "rgba(195,142,75,0.13)");
  lampGlow.addColorStop(0.55, "rgba(84,63,40,0.05)");
  lampGlow.addColorStop(1, "rgba(0,0,0,0)");
  ctx.fillStyle = lampGlow;
  ctx.fillRect(0, 0, W, H);

  drawSideWall(0, -state.cameraY * 0.42);
  drawSideWall(W - 42, -state.cameraY * 0.42);
  drawDrillPipes();

  ctx.strokeStyle = "rgba(214,165,92,0.09)";
  ctx.lineWidth = 2;
  const layerOff = -state.cameraY * 0.38 % 82;
  for (let y = layerOff - 82; y < H + 90; y += 82) {
    ctx.beginPath();
    ctx.moveTo(36, y);
    ctx.quadraticCurveTo(118, y + 28, 204, y + 5);
    ctx.quadraticCurveTo(314, y - 24, W - 32, y + 17);
    ctx.stroke();
  }

  const oilOff = -state.cameraY * 0.55 % 210;
  for (let i = 0; i < 4; i++) {
    const y = oilOff + i * 210 - 120;
    ctx.lineCap = "round";
    ctx.strokeStyle = "rgba(0,0,0,0.7)";
    ctx.lineWidth = 9;
    ctx.beginPath();
    ctx.moveTo(i % 2 ? W - 34 : 32, y);
    ctx.bezierCurveTo(i % 2 ? W - 98 : 108, y + 28, i % 2 ? W - 76 : 84, y + 74, i % 2 ? W - 138 : 142, y + 112);
    ctx.stroke();
    ctx.strokeStyle = "rgba(109,145,132,0.22)";
    ctx.lineWidth = 3;
    ctx.stroke();
    ctx.fillStyle = "rgba(0,0,0,0.72)";
    ellipse(i % 2 ? W - 138 : 142, y + 114, 7, 10);
    ctx.fillStyle = "rgba(242,255,240,0.22)";
    ellipse(i % 2 ? W - 141 : 139, y + 108, 2.4, 4);
  }
  ctx.lineCap = "butt";

  ctx.fillStyle = "rgba(0,0,0,0.23)";
  ctx.fillRect(0, 0, W, 122);
}

function drawSideWall(x, offset) {
  const left = x < W / 2;
  const wall = ctx.createLinearGradient(x, 0, x + 42, 0);
  if (left) {
    wall.addColorStop(0, "#100c08");
    wall.addColorStop(0.58, "#3a2a1d");
    wall.addColorStop(1, "rgba(22,17,12,0)");
  } else {
    wall.addColorStop(0, "rgba(22,17,12,0)");
    wall.addColorStop(0.42, "#3a2a1d");
    wall.addColorStop(1, "#100c08");
  }
  ctx.fillStyle = wall;
  ctx.fillRect(x, 0, 42, H);

  ctx.strokeStyle = "rgba(226,178,111,0.18)";
  ctx.lineWidth = 2;
  for (let y = offset % 96 - 96; y < H + 96; y += 96) {
    ctx.beginPath();
    if (left) {
      ctx.moveTo(x + 4, y);
      ctx.lineTo(x + 32, y + 34);
      ctx.lineTo(x + 12, y + 76);
    } else {
      ctx.moveTo(x + 38, y);
      ctx.lineTo(x + 10, y + 34);
      ctx.lineTo(x + 30, y + 76);
    }
    ctx.stroke();
  }

  ctx.fillStyle = "rgba(215,163,83,0.16)";
  for (let i = 0; i < 7; i++) {
    const py = (offset * 1.7 + i * 137) % (H + 120) - 60;
    const px = x + 8 + ((i * 17) % 22);
    circle(px, py, 2 + (i % 3));
  }
}

function drawDrillPipes() {
  const pipeOff = -state.cameraY * 0.7 % 52;
  ctx.strokeStyle = "rgba(68,78,72,0.74)";
  ctx.lineWidth = 7;
  ctx.lineCap = "round";
  ctx.beginPath();
  ctx.moveTo(73, -10);
  ctx.lineTo(73, H + 10);
  ctx.moveTo(W - 73, -10);
  ctx.lineTo(W - 73, H + 10);
  ctx.stroke();

  ctx.fillStyle = "rgba(183,154,105,0.52)";
  for (let y = pipeOff - 52; y < H + 58; y += 52) {
    round(63, y, 20, 7, 2, true);
    round(W - 83, y + 20, 20, 7, 2, true);
  }
}

function drawWorld() {
  for (const p of state.platforms) {
    const sy = p.y - state.cameraY;
    if (sy < -70 || sy > H + 80 || p.gone) continue;
    drawPlatform(p, sy);
  }

  for (const item of state.pickups) {
    if (item.taken) continue;
    const sy = item.y - state.cameraY;
    if (sy < -80 || sy > H + 80) continue;
    drawPickup(item, sy);
  }

  for (const d of state.drones) {
    const sy = d.y - state.cameraY;
    if (sy < -80 || sy > H + 80) continue;
    drawDrone(d, sy);
  }

  for (const m of state.monsters) {
    const sy = m.y - state.cameraY;
    if (sy < -100 || sy > H + 100) continue;
    drawMonster(m, sy);
  }

  for (const l of state.lasers) {
    const sy = l.y - state.cameraY;
    if (sy < -80 || sy > H + 80) continue;
    drawLaser(l, sy);
  }

  drawOilTrail();
  drawPlayer(state.player, state.player.y - state.cameraY);
  drawParticles();
}

function drawOilTrail() {
  if (!state.oilTrail) return;
  for (const drop of state.oilTrail) {
    const sy = drop.y - state.cameraY;
    if (sy < -60 || sy > H + 80) continue;
    const p = clamp(drop.life / drop.maxLife, 0, 1);
    const wobble = Math.sin(state.time * 7 + drop.seed) * 0.6;
    ctx.save();
    ctx.globalAlpha = 0.18 + p * 0.7;
    ctx.translate(drop.x, sy);
    ctx.rotate(wobble * 0.08);
    const w = drop.r * (1.8 + (1 - p) * 1.2);
    const h = drop.r * (0.85 + drop.stretch * p);
    const g = ctx.createRadialGradient(-w * 0.22, -h * 0.28, 1, 0, 0, Math.max(w, h));
    g.addColorStop(0, "rgba(58,64,50,0.95)");
    g.addColorStop(0.38, "rgba(10,12,9,0.96)");
    g.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = g;
    ellipse(0, 0, w, h);
    ctx.fillStyle = "rgba(255,245,205," + (0.16 * p).toFixed(3) + ")";
    ellipse(-w * 0.2, -h * 0.25, Math.max(1.2, w * 0.18), Math.max(0.8, h * 0.18));
    ctx.restore();
  }
}

function drawPlatform(p, sy) {
  ctx.save();
  ctx.translate(p.x, sy);
  ctx.globalAlpha = p.breakTime > 0 ? 0.55 + Math.sin(state.time * 38) * 0.22 : 1;

  ctx.fillStyle = "rgba(0,0,0,0.34)";
  round(4, 9, p.w, 12, 6, true);

  if (p.type === "checkpoint") {
    const g = ctx.createLinearGradient(0, -18, 0, 18);
    g.addColorStop(0, "#6ca979");
    g.addColorStop(1, "#2f5b49");
    ctx.fillStyle = g;
  } else if (p.type === "safe") {
    ctx.fillStyle = "#68776a";
  } else if (p.type === "moving") {
    ctx.fillStyle = "#496b78";
  } else if (p.type === "trampoline") {
    const g = ctx.createLinearGradient(0, -15, 0, 18);
    g.addColorStop(0, "#79d8d8");
    g.addColorStop(0.48, "#2f6268");
    g.addColorStop(1, "#142e36");
    ctx.fillStyle = g;
  } else if (p.type === "spike") {
    ctx.fillStyle = "#69584a";
  } else if (p.type === "cracked") {
    ctx.fillStyle = "#695b4e";
  } else {
    const g = ctx.createLinearGradient(0, -8, 0, 18);
    g.addColorStop(0, COLORS.concrete);
    g.addColorStop(1, COLORS.concreteDark);
    ctx.fillStyle = g;
  }

  round(0, -7, p.w, 18, 5, true);
  ctx.strokeStyle = "rgba(235,222,176,0.18)";
  ctx.lineWidth = 1.5;
  round(0, -7, p.w, 18, 5, false);

  ctx.fillStyle = "rgba(255,255,255,0.08)";
  ctx.fillRect(8, -5, Math.max(12, p.w - 16), 2);
  ctx.fillStyle = "rgba(0,0,0,0.18)";
  for (let x = 12; x < p.w - 12; x += 34) ctx.fillRect(x, 8, 18, 3);

  if (p.type === "moving") {
    ctx.strokeStyle = "rgba(132,233,255,0.55)";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(8, -16);
    ctx.lineTo(p.w - 8, -16);
    ctx.stroke();
    ctx.fillStyle = COLORS.cyan;
    circle(p.w * 0.25, -16, 3);
    circle(p.w * 0.72, -16, 3);
  }

  if (p.type === "trampoline") {
    const spring = p.spring || 0;
    const padY = -18 + spring * 7;
    ctx.save();
    ctx.shadowColor = "rgba(132,233,255,0.65)";
    ctx.shadowBlur = 8 + spring * 14;
    ctx.strokeStyle = "rgba(132,233,255," + (0.62 + spring * 0.25).toFixed(3) + ")";
    ctx.lineWidth = 3.5;
    ctx.beginPath();
    ctx.moveTo(12, padY);
    ctx.lineTo(p.w - 12, padY);
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.strokeStyle = "rgba(255,215,105,0.72)";
    ctx.lineWidth = 2;
    for (let x = 22; x < p.w - 18; x += 22) {
      ctx.beginPath();
      ctx.moveTo(x - 8, -6);
      ctx.lineTo(x, padY + 8);
      ctx.lineTo(x + 8, -6);
      ctx.stroke();
    }
    ctx.fillStyle = "rgba(132,233,255,0.9)";
    circle(p.w * 0.22, padY, 3.4 + spring * 2.4);
    circle(p.w * 0.78, padY, 3.4 + spring * 2.4);
    ctx.restore();
  }

  if (p.type === "spike") {
    ctx.fillStyle = "#d5a548";
    for (let x = 12; x < p.w - 4; x += 18) {
      ctx.beginPath();
      ctx.moveTo(x, -8);
      ctx.lineTo(x + 8, -25);
      ctx.lineTo(x + 16, -8);
      ctx.fill();
    }
    ctx.fillStyle = "#302316";
    label("!", p.w / 2, -27, 15, "#ffdf86");
  }

  if (p.type === "cracked") {
    ctx.strokeStyle = "rgba(28,21,18,0.58)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(p.w * 0.25, -7);
    ctx.lineTo(p.w * 0.35, 8);
    ctx.lineTo(p.w * 0.48, -3);
    ctx.moveTo(p.w * 0.62, -7);
    ctx.lineTo(p.w * 0.55, 10);
    ctx.lineTo(p.w * 0.74, 0);
    ctx.stroke();
  }

  if (p.type === "checkpoint") {
    label("安全点", p.w / 2, -24, 13, "#dff9df");
  } else if (p.type === "trampoline") {
    label("弹", p.w / 2, -31 - (p.spring || 0) * 5, 13, "#a9ffff");
  } else if (p.floor > 0 && p.floor % 10 === 0) {
    label(p.floor + "层", p.w / 2, -20, 12, "rgba(243,226,180,0.62)");
  }

  ctx.restore();
}

function drawPickup(item, sy) {
  ctx.save();
  const wobble = Math.sin(state.time * 4.4 + item.pulse);
  ctx.translate(item.x, sy + wobble * 2.4);
  const pulse = 0.58 + wobble * 0.18;
  const color = pickupColor(item.type);
  drawPickupHighlight(color, pulse);
  ctx.rotate(Math.sin(state.time * 2.7 + item.pulse) * 0.045);
  ctx.globalAlpha = 0.56 + pulse * 0.32;
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  circleStroke(0, -8, 24 + pulse * 2);
  ctx.globalAlpha = 1;

  if (item.type === "hostage") drawOilSampleIcon(0, 3);
  else if (item.type === "barrel") drawOilBarrelIcon(0, 2);
  else if (item.type === "crate") drawSupplyCrateIcon(0, 2);
  else if (item.type === "medal") drawMedalIcon(0, 3);
  else drawMedIcon(0, 4);
  ctx.restore();
}

function pickupColor(type) {
  if (type === "hostage") return "rgba(255,190,83,0.95)";
  if (type === "barrel") return "rgba(255,126,44,0.95)";
  if (type === "crate") return "rgba(222,190,96,0.95)";
  if (type === "medal") return "rgba(255,214,82,0.95)";
  return "rgba(92,164,255,0.95)";
}

function drawPickupHighlight(color, pulse) {
  ctx.save();
  const glow = ctx.createRadialGradient(0, -8, 8, 0, -8, 48 + pulse * 14);
  glow.addColorStop(0, color.replace("0.95", "0.38"));
  glow.addColorStop(0.5, color.replace("0.95", "0.16"));
  glow.addColorStop(1, "rgba(0,0,0,0)");
  ctx.fillStyle = glow;
  circle(0, -8, 54 + pulse * 12);

  const beam = ctx.createLinearGradient(0, -86, 0, 22);
  beam.addColorStop(0, "rgba(0,0,0,0)");
  beam.addColorStop(0.55, color.replace("0.95", "0.15"));
  beam.addColorStop(1, "rgba(0,0,0,0)");
  ctx.fillStyle = beam;
  round(-12, -86, 24, 112, 12, true);

  ctx.strokeStyle = color;
  ctx.lineWidth = 3;
  ctx.globalAlpha = 0.36 + pulse * 0.44;
